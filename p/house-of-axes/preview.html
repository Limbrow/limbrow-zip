<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Axes — preview</title>
<style>
    :root {
        --bg:   #070706;
        --warm: #ff2a2a;
        --cold: #2a6bff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        background: var(--bg);
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: 'Space Mono', monospace;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Grain overlay */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
        opacity: 0.4;
        pointer-events: none;
        z-index: 10;
    }

    #svg-main {
        width: 100%;
        height: 100%;
        display: block;
        max-width: 100%;
        max-height: 100%;
    }

    /* ── ANIMATIONS ── */
    @keyframes drawPath {
        from { stroke-dashoffset: 1; }
        to   { stroke-dashoffset: 0; }
    }

    .draw-q1 {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        pathLength: 1;
        animation: drawPath 2.4s cubic-bezier(0.4,0,0.2,1) 0.4s both;
    }
    .draw-q3 {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        pathLength: 1;
        animation: drawPath 2.4s cubic-bezier(0.4,0,0.2,1) 0.8s both;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
    }

    .fade-axes { animation: fadeIn 0.8s ease 0.1s both; }
    .fade-late { animation: fadeIn 1.2s ease 2s both; }
</style>
</head>
<body>

<svg id="svg-main" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Q1 branch gradient: warm red -->
        <linearGradient id="gQ1" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="var(--warm)" stop-opacity="0.5"/>
            <stop offset="55%"  stop-color="var(--warm)" stop-opacity="1"/>
            <stop offset="100%" stop-color="var(--warm)" stop-opacity="0.35"/>
        </linearGradient>
        <!-- Q3 branch gradient: cold blue -->
        <linearGradient id="gQ3" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="var(--cold)" stop-opacity="0.5"/>
            <stop offset="55%"  stop-color="var(--cold)" stop-opacity="1"/>
            <stop offset="100%" stop-color="var(--cold)" stop-opacity="0.35"/>
        </linearGradient>

        <!-- Glows -->
        <filter id="glowWarm" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowCold" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <clipPath id="clip">
            <rect x="40" y="40" width="420" height="420"/>
        </clipPath>

        <marker id="arrFg" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 Z" fill="#3a3630"/>
        </marker>

        <!-- Subtle grid -->
        <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse" x="40" y="40">
            <path d="M42 0 L0 0 0 42" fill="none" stroke="#0f0e0c" stroke-width="0.7"/>
        </pattern>
    </defs>

    <!-- Grid -->
    <rect x="40" y="40" width="420" height="420" fill="url(#grid)" class="fade-axes"/>

    <!-- Asymptote dashed lines -->
    <g class="fade-axes">
        <line x1="250" y1="40" x2="250" y2="460"
              stroke="#2a2820" stroke-width="1" stroke-dasharray="5,6"/>
        <line x1="40" y1="250" x2="460" y2="250"
              stroke="#2a2820" stroke-width="1" stroke-dasharray="5,6"/>
    </g>

    <!-- Axes -->
    <g class="fade-axes">
        <line x1="250" y1="460" x2="250" y2="46"
              stroke="#3a3630" stroke-width="1.4" marker-end="url(#arrFg)"/>
        <line x1="40" y1="250" x2="454" y2="250"
              stroke="#3a3630" stroke-width="1.4" marker-end="url(#arrFg)"/>

        <text x="462" y="254" font-family="'IM Fell English',serif" font-style="italic" font-size="16" fill="#4a4640">x</text>
        <text x="240" y="40"  font-family="'IM Fell English',serif" font-style="italic" font-size="16" fill="#4a4640">y</text>

        <circle cx="250" cy="250" r="2.5" fill="#3a3630"/>
    </g>

    <!--
        Centered coordinate system. Origin at (250,250). Scale: 42 px/unit.
        Q1 curve: x>0, y=1/x. Sampled with x: 0.45 .. 5.0
            x=0.45  → xs=269,  ys=250-93=157
            x=0.55  → xs=273,  ys=250-76=174
            x=0.70  → xs=279,  ys=250-60=190
            x=0.90  → xs=288,  ys=250-47=203
            x=1.20  → xs=300,  ys=250-35=215
            x=1.60  → xs=317,  ys=250-26=224
            x=2.20  → xs=342,  ys=250-19=231
            x=3.00  → xs=376,  ys=250-14=236
            x=4.00  → xs=418,  ys=250-10.5=239.5
            x=5.00  → xs=460,  ys=250-8.4=241.6
        Q3 mirror through origin.
    -->

    <!-- Q1 branch — warm red -->
    <path class="draw-q1"
        clip-path="url(#clip)"
        d="M 460,241.6
           C 440,242 420,241 400,240
           C 380,239 360,237.5 340,235
           C 320,231.5 305,227 295,221
           C 287,215 281,207 277,197
           C 273,184 270,168 267,148
           C 264.5,128 262.5,108 261,80
           C 260,60 259,42 258,30"
        fill="none"
        stroke="url(#gQ1)"
        stroke-width="3"
        stroke-linecap="round"
        filter="url(#glowWarm)"
        pathLength="1"
    />

    <!-- Q3 branch — cold blue -->
    <path class="draw-q3"
        clip-path="url(#clip)"
        d="M 40,258.4
           C 60,258 80,259 100,260
           C 120,261 140,262.5 160,265
           C 180,268.5 195,273 205,279
           C 213,285 219,293 223,303
           C 227,316 230,332 233,352
           C 235.5,372 237.5,392 239,420
           C 240,440 241,458 242,470"
        fill="none"
        stroke="url(#gQ3)"
        stroke-width="3"
        stroke-linecap="round"
        filter="url(#glowCold)"
        pathLength="1"
    />

    <!-- Function label — appears after curves are drawn -->
    <text x="380" y="195"
          font-family="'IM Fell English',serif" font-style="italic" font-size="20"
          fill="#6a6460" text-anchor="middle" class="fade-late">
        f(x) = 1/x
    </text>

</svg>

</body>
</html>
