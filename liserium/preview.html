<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>liserium · preview</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --bg:           #E2E8E4;
        --screen-bg:    #C3CD9E;
        --screen-glow:  #9bbc0f;
        --screen-dark:  #0F1A0C;
        --bevel-dark:   #4A5450;
        --bevel-light:  #FAFAF0;
        --panel-shadow: rgba(0,0,0,0.18);
    }

    html, body {
        background: var(--bg);
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: 'Silkscreen', 'VT323', monospace;
    }

    body {
        display: flex;
        flex-direction: column;
        padding: clamp(10px, 4vw, 20px);
        gap: clamp(8px, 2.5vw, 14px);
    }

    /* ─── BRAND (tiny, top) ─── */
    .brand {
        font-size: clamp(10px, 3vw, 14px);
        letter-spacing: 0.4em;
        color: #6a7570;
        text-align: center;
        font-weight: 700;
        padding-top: 4px;
    }

    /* ─── LCD ─── */
    .lcd {
        flex: 1;
        background: var(--screen-bg);
        border: 3px solid var(--screen-dark);
        border-radius: 6px;
        box-shadow:
            inset 0 0 30px rgba(0,0,0,0.18),
            0 2px 4px var(--panel-shadow);
        position: relative;
        overflow: hidden;
        padding: 10px 14px;
    }
    .lcd::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            repeating-linear-gradient(0deg, transparent 0px, transparent 1px, rgba(15,26,12,0.04) 1px, rgba(15,26,12,0.04) 2px);
        pointer-events: none;
    }

    .lcd-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: clamp(9px, 2.5vw, 12px);
        color: var(--screen-dark);
        position: relative;
        z-index: 2;
    }

    canvas#osc {
        position: absolute;
        inset: 30px 14px;
        width: calc(100% - 28px);
        height: calc(100% - 60px);
        z-index: 1;
    }

    /* ─── SEQUENCER ─── */
    #sequencer {
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: clamp(2px, 0.8vw, 4px);
        flex-shrink: 0;
    }

    .step {
        aspect-ratio: 1 / 1.4;
        background: #d6dcc0;
        border: 1.5px solid #8a8770;
        border-radius: 2px;
        transition: all 0.06s;
    }
    .step.enabled {
        background: #303a20;
        border-color: #1a1f10;
    }
    .step.playing {
        box-shadow: 0 0 10px rgba(155, 188, 15, 0.7) inset;
        outline: 1.5px solid rgba(155, 188, 15, 0.85);
    }
</style>
</head>
<body>

<div class="brand">LISERIUM</div>

<div class="lcd">
    <div class="lcd-row">
        <span>130 BPM</span>
        <span>DEEP</span>
    </div>
    <canvas id="osc"></canvas>
    <div class="lcd-row" style="position:absolute; bottom:8px; left:14px; right:14px; z-index:2;">
        <span>♪ PLAYING</span>
        <span></span>
    </div>
</div>

<div id="sequencer"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// LISERIUM PREVIEW — square crop of LCD + sequencer
// No external libs. Visual-only fake waveform that "runs" at 130 BPM.
// ════════════════════════════════════════════════════════════════════════════

(function() {
    const STEPS = 16;
    const ENABLED = [0, 4, 8, 12];        // 4-on-the-floor kick
    const ACCENT  = [3, 7, 11, 14];       // off-beat accents
    const BPM = 130;
    const STEP_MS = (60000 / BPM) / 4;    // 16th note duration

    // Build sequencer cells
    const seq = document.getElementById('sequencer');
    const cells = [];
    for (let i = 0; i < STEPS; i++) {
        const c = document.createElement('div');
        c.className = 'step';
        if (ENABLED.includes(i)) c.classList.add('enabled');
        if (ACCENT.includes(i))  c.classList.add('accent');
        seq.appendChild(c);
        cells.push(c);
    }

    // Oscilloscope canvas
    const osc = document.getElementById('osc');
    const ctx = osc.getContext('2d');
    function fit() {
        const r = osc.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        osc.width  = Math.max(1, Math.floor(r.width * dpr));
        osc.height = Math.max(1, Math.floor(r.height * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', fit);
    fit();

    const t0 = performance.now();
    let currentStep = -1;
    let lastKickAt = 0;

    function drawWave(now, kickEnv) {
        const w = osc.clientWidth, h = osc.clientHeight;
        ctx.clearRect(0, 0, w, h);

        const mid = h / 2;
        const baseAmp = h * 0.32;
        const kickAmp = h * 0.22 * kickEnv;
        const t = (now - t0) / 1000;

        // Layered components for a dub-techno feel
        ctx.strokeStyle = 'rgba(48, 58, 32, 0.85)';
        ctx.lineWidth = 1.4;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let x = 0; x < w; x += 1) {
            const u = x / w;
            const swell   = Math.sin(u * 4  + t * 0.7) * 0.45;
            const lead    = Math.sin(u * 11 + t * 1.6 + Math.sin(t * 0.3) * 0.8) * 0.32;
            const shimmer = Math.sin(u * 38 + t * 6.0) * 0.10 * (0.5 + 0.5 * Math.sin(t * 0.6));
            const dubPulse = Math.sin(u * 2.0 - t * 0.4) * 0.15 * kickEnv;
            const y = mid + (swell + lead + shimmer) * baseAmp + dubPulse * kickAmp;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Soft glow trail
        ctx.strokeStyle = `rgba(48, 58, 32, ${0.20 + kickEnv * 0.15})`;
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function tick(now) {
        const elapsed = now - t0;
        const step = Math.floor(elapsed / STEP_MS) % STEPS;

        if (step !== currentStep) {
            if (currentStep >= 0 && cells[currentStep]) cells[currentStep].classList.remove('playing');
            if (cells[step]) cells[step].classList.add('playing');
            currentStep = step;
            if (ENABLED.includes(step)) lastKickAt = now;
        }

        const sinceKick = (now - lastKickAt) / 1000;
        const kickEnv = Math.max(0, Math.exp(-sinceKick * 4));

        drawWave(now, kickEnv);
        requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
})();
</script>

</body>
</html>
