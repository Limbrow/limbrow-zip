<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>moiré · preview</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #04050a; width: 100%; height: 100vh; height: 100dvh; overflow: hidden; }
    #stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<canvas id="stage"></canvas>

<script>
// Two moiré layers that slowly slide and rotate past each other, cycling
// pattern types, so the card shimmers with interference fringes.
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

let DPR = 1, VW = 0, VH = 0;
function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    VW = window.innerWidth; VH = window.innerHeight;
    canvas.width = Math.floor(VW * DPR);
    canvas.height = Math.floor(VH * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', fit);
fit();

const TYPES = ['lines', 'rings', 'radial', 'spiral'];
const blend = 'screen';
const bg = '#04050a';

function drawLayer(L) {
    const cx = L.cx * VW, cy = L.cy * VH;
    const p = L.scale, duty = 0.5;
    const diag = Math.sqrt(VW * VW + VH * VH);
    ctx.fillStyle = L.color;
    ctx.strokeStyle = L.color;
    if (L.type === 'lines') {
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(L.angle * Math.PI / 180);
        const w = p * duty, n = Math.ceil(diag / p) + 2;
        for (let i = -n; i <= n; i++) ctx.fillRect(i * p - w / 2, -diag, w, diag * 2);
        ctx.restore();
    } else if (L.type === 'rings') {
        ctx.lineWidth = p * duty;
        for (let r = p; r < diag; r += p) { ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke(); }
    } else if (L.type === 'radial') {
        const count = Math.max(6, Math.round(720 / p)), step = Math.PI * 2 / count, a0 = L.angle * Math.PI / 180;
        ctx.save(); ctx.translate(cx, cy);
        for (let i = 0; i < count; i++) {
            const a = a0 + i * step;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, diag, a - step * 0.25, a + step * 0.25); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
    } else {
        ctx.lineWidth = p * duty;
        const a0 = L.angle * Math.PI / 180, steps = Math.ceil((diag / p) * 60);
        ctx.beginPath();
        for (let s = 0; s <= steps; s++) {
            const th = (s / 60) * Math.PI * 2, r = (p / (Math.PI * 2)) * th;
            const x = cx + Math.cos(th + a0) * r, y = cy + Math.sin(th + a0) * r;
            if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
}

const CYCLE_MS = 7000;
function frame(now) {
    const phase = (now % CYCLE_MS) / CYCLE_MS;
    const ti = Math.floor(now / CYCLE_MS) % TYPES.length;
    const type = TYPES[ti];
    const t = now * 0.0004;

    const L1 = { type, color: '#7af6e0', scale: 16,   // soft aqua
                 angle: type === 'lines' ? 0 : t * 8,
                 cx: 0.5 + Math.sin(t * 0.5) * 0.04, cy: 0.5 };
    const L2 = { type, color: '#ff9ec7', scale: 16,   // pastel rose
                 angle: (type === 'lines' ? 5 : 5) + t * 9,
                 cx: 0.5 - Math.sin(t * 0.5) * 0.04, cy: 0.5 + Math.cos(t * 0.4) * 0.03 };

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = bg; ctx.fillRect(0, 0, VW, VH);
    drawLayer(L1);
    ctx.globalCompositeOperation = blend;
    drawLayer(L2);
    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>

</body>
</html>
