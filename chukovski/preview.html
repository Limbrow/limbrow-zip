<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chukovski · preview</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: #ead9b2;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
    }
    .stage {
        position: fixed;
        inset: 0;
        background-image: url('painting.jpg');
        background-repeat: no-repeat;
        background-position: 50% 38%;
        background-size: cover;
        /* Painting is 602×717 — face/upper body sits in the top ~55%.
           Cover + center-upper anchor keeps the face in frame on any aspect. */
        animation: breathe 16s ease-in-out infinite alternate;
        transform-origin: 50% 40%;
    }
    @keyframes breathe {
        from { transform: scale(1.00); filter: brightness(1.00); }
        to   { transform: scale(1.06); filter: brightness(1.04); }
    }
    /* Subtle paper-tone vignette around the edges so the card blends with
       the grid rather than feeling like a bare image. */
    .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
            radial-gradient(ellipse at 50% 45%, transparent 50%, rgba(40, 28, 12, 0.18) 100%);
    }
</style>
</head>
<body>
<div class="stage"></div>
<div class="vignette"></div>
</body>
</html>
