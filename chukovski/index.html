<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Repin · 1910 · limbrow.zip</title>
<meta name="description" content="Retrato de Kornéi Chukovski, Iliá Repin, 1910.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        background: #1a1208;
        color: #f3ead4;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none; user-select: none;
        -webkit-text-size-adjust: 100%;
    }

    /* ─── BLURRED BACKDROP (the painting itself, oversized + blurred) ─── */
    .backdrop {
        position: fixed;
        inset: -60px;
        z-index: 1;
        background-image: url('painting.jpg');
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        filter: blur(48px) saturate(1.15) brightness(0.55);
        transform: scale(1.15);
    }
    .backdrop::after {
        /* Vignette so the edges fade into deep brown, focusing the painting */
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(8, 5, 2, 0.55) 100%);
    }

    /* ─── BACK ─── */
    .back {
        position: fixed;
        top: 16px; left: 16px;
        z-index: 100;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 50%;
        color: rgba(255, 240, 220, 0.75);
        text-decoration: none;
        font-size: 16px;
        line-height: 1;
        padding-bottom: 2px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        font-family: ui-monospace, monospace;
    }

    /* ─── MODAL (painting + subtle title) ─── */
    .modal {
        position: relative;
        z-index: 10;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(16px, 3vh, 28px);
        padding: 56px 24px 36px;
    }

    .painting {
        max-width: min(92%, 460px);
        max-height: 70vh;
        width: auto;
        height: auto;
        display: block;
        box-shadow:
            0 40px 70px -10px rgba(0, 0, 0, 0.6),
            0 12px 30px -8px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(0, 0, 0, 0.4);
    }

    .title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-style: italic;
        font-weight: 400;
        font-size: clamp(14px, 3.5vw, 17px);
        line-height: 1.4;
        color: rgba(245, 235, 215, 0.55);
        letter-spacing: 0.03em;
        text-align: center;
        max-width: 28ch;
    }

    /* ─── FADE-IN ON LOAD ─── */
    .painting, .title {
        opacity: 0;
        transform: translateY(10px);
        animation: rise 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .painting { animation-delay: 0.15s; }
    .title    { animation-delay: 0.95s; }

    @keyframes rise {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-height: 700px) {
        .modal { padding: 48px 20px 24px; gap: 14px; }
        .painting { max-height: 62vh; }
    }
</style>
</head>
<body>

<div class="backdrop"></div>

<a class="back" href="/" aria-label="Volver">←</a>

<main class="modal">
    <img class="painting"
         src="painting.jpg"
         alt="Retrato de Kornéi Chukovski por Iliá Repin, 1910"
         width="602" height="717">
    <h1 class="title">Retrato de Kornéi Chukovski</h1>
</main>

</body>
</html>
