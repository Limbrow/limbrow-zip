<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>i can't get out · limbrow.zip</title>
<meta name="description" content="I can't get out — a track.">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        background: #050507;
        color: #e8e8e8;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    .back {
        position: fixed;
        top: 16px; left: 16px;
        z-index: 100;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 50%;
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        font-size: 16px; line-height: 1; padding-bottom: 2px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    #viz {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        display: block; z-index: 1;
    }

    .stage {
        position: fixed; inset: 0; z-index: 2;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: clamp(20px, 5vh, 44px);
        padding: 40px 24px;
        pointer-events: none;
    }

    .title-block { text-align: center; }
    .track-title {
        font-size: clamp(20px, 6vw, 38px);
        font-weight: 500;
        letter-spacing: 0.04em;
        line-height: 1.15;
    }
    .track-by {
        margin-top: 8px;
        font-size: 11px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
    }

    /* tap-to-play hint over the centre */
    .play-orb {
        pointer-events: auto;
        width: clamp(64px, 18vw, 92px);
        height: clamp(64px, 18vw, 92px);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.18);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        cursor: pointer;
        transition: transform 0.18s ease, background 0.2s, opacity 0.4s ease;
    }
    .play-orb:active { transform: scale(0.94); }
    .play-orb svg { width: 40%; height: 40%; fill: #fff; }
    .play-orb.playing { opacity: 0; pointer-events: none; }

    /* controls */
    .controls {
        pointer-events: auto;
        width: min(440px, calc(100vw - 48px));
        display: flex; flex-direction: column; gap: 14px;
    }
    .progress {
        height: 3px; width: 100%;
        background: rgba(255,255,255,0.12);
        border-radius: 2px; cursor: pointer;
        position: relative; overflow: hidden;
    }
    .progress .fill {
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 0%;
        background: linear-gradient(90deg, #ff8a5c, #ff5c7a);
    }
    .meta-row {
        display: flex; justify-content: space-between; align-items: center;
        font-size: 10px; letter-spacing: 0.1em; color: rgba(255,255,255,0.55);
    }
    .time { font-variant-numeric: tabular-nums; }
    .dl {
        color: rgba(255,255,255,0.65);
        text-decoration: none;
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 999px;
        padding: 7px 14px;
        font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
        transition: all 0.18s;
    }
    .dl:hover { color: #fff; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); }
</style>
</head>
<body>

<a class="back" href="/" aria-label="Back to grid">←</a>

<canvas id="viz"></canvas>

<div class="stage">
    <div class="title-block">
        <div class="track-title">I can't get out</div>
    </div>

    <button class="play-orb" id="play-orb" aria-label="Play">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <div class="controls">
        <div class="progress" id="progress"><div class="fill" id="fill"></div></div>
        <div class="meta-row">
            <span class="time"><span id="cur">0:00</span> / <span id="dur">0:00</span></span>
            <a class="dl" href="i-cant-get-out.mp3" download="i cant get out.mp3">↓ download</a>
        </div>
    </div>
</div>

<audio id="audio" src="i-cant-get-out.mp3" preload="metadata" playsinline></audio>

<script>
// ════════════════════════════════════════════════════════════════════════════
// HELP — "I can't get out", a track by limbrow.
//
// A single-track player. The visualiser is a closed waveform confined inside a
// ring: the live audio pushes the inner shape outward and it flares where it
// reaches the wall but never breaks through — a quiet literalisation of the
// title. Web Audio AnalyserNode drives both the time-domain deformation and a
// bass-reactive hue. Tap the orb (or anywhere) to play; scrub the bar; download
// the file.
// ════════════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');
const audio = document.getElementById('audio');
const orb = document.getElementById('play-orb');
const fill = document.getElementById('fill');
const curEl = document.getElementById('cur');
const durEl = document.getElementById('dur');
const progress = document.getElementById('progress');

let DPR = 1, VW = 0, VH = 0;
function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    VW = window.innerWidth; VH = window.innerHeight;
    canvas.width = Math.floor(VW * DPR);
    canvas.height = Math.floor(VH * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', fit);
fit();

// ─── AUDIO GRAPH ───────────────────────────────────────────────────────────
let actx = null, analyser = null, timeData = null, freqData = null;
function initAudioGraph() {
    if (actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    const src = actx.createMediaElementSource(audio);
    analyser = actx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.82;
    timeData = new Uint8Array(analyser.fftSize);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    src.connect(analyser);
    analyser.connect(actx.destination);
}

function togglePlay() {
    initAudioGraph();
    if (actx.state === 'suspended') actx.resume();
    if (audio.paused) audio.play().catch(()=>{});
    else audio.pause();
}

orb.addEventListener('click', e => { e.stopPropagation(); togglePlay(); });
// Tap anywhere on the visualiser also toggles
canvas.addEventListener('pointerdown', () => togglePlay());

audio.addEventListener('play',  () => orb.classList.add('playing'));
audio.addEventListener('pause', () => orb.classList.remove('playing'));
audio.addEventListener('ended', () => orb.classList.remove('playing'));

// ─── PROGRESS ──────────────────────────────────────────────────────────────
function fmt(t) {
    if (!isFinite(t)) return '0:00';
    const m = Math.floor(t / 60), s = Math.floor(t % 60);
    return m + ':' + String(s).padStart(2, '0');
}
audio.addEventListener('loadedmetadata', () => { durEl.textContent = fmt(audio.duration); });
audio.addEventListener('timeupdate', () => {
    curEl.textContent = fmt(audio.currentTime);
    fill.style.width = (audio.currentTime / (audio.duration || 1) * 100) + '%';
});
progress.addEventListener('pointerdown', e => {
    const r = progress.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    if (isFinite(audio.duration)) audio.currentTime = p * audio.duration;
    e.stopPropagation();
});

// ─── VISUALISER ────────────────────────────────────────────────────────────
// A confined waveform inside a ring (the "can't get out" image), wrapped in a
// full-spectrum corona of frequency bars. The whole thing is rainbow-coloured
// and the hue wheel rotates with the music.
let phase = 0, hueRot = 0;
function frame(now) {
    // Soft trail instead of a hard clear — leaves gentle motion ghosts
    ctx.fillStyle = 'rgba(5,5,7,0.32)';
    ctx.fillRect(0, 0, VW, VH);

    const cx = VW / 2, cy = VH / 2;
    const baseR = Math.min(VW, VH) * 0.24;
    const wallR = baseR * 1.46;
    const playing = analyser && !audio.paused;

    let energy = 0, bass = 0;
    if (playing) {
        analyser.getByteTimeDomainData(timeData);
        analyser.getByteFrequencyData(freqData);
        let sum = 0;
        for (let i = 0; i < 64; i++) sum += freqData[i];
        bass = sum / 64 / 255;
        let e = 0;
        for (let i = 0; i < freqData.length; i += 8) e += freqData[i];
        energy = e / (freqData.length / 8) / 255;
    }

    phase  += 0.004 + bass * 0.02;
    hueRot += 0.25 + bass * 2.2;

    ctx.globalCompositeOperation = 'lighter';

    // ── Spectral corona — frequency bars radiating outward in rainbow ──
    const NB = 128;
    for (let i = 0; i < NB; i++) {
        let amp;
        if (playing) {
            const fi = Math.floor((i / NB) * (freqData.length * 0.7));
            amp = freqData[fi] / 255;
        } else {
            amp = 0.10 + 0.08 * (0.5 + 0.5 * Math.sin(i * 0.5 + phase * 2));
        }
        const a = (i / NB) * Math.PI * 2 + phase * 0.3;
        const r0 = wallR + 4;
        const r1 = r0 + amp * baseR * 1.5;
        const hue = (i / NB * 360 + hueRot) % 360;
        ctx.strokeStyle = `hsla(${hue}, 95%, ${55 + amp * 25}%, ${0.25 + amp * 0.7})`;
        ctx.lineWidth = (Math.PI * 2 * r0 / NB) * 0.6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * r0, cy + Math.sin(a) * r0);
        ctx.lineTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
        ctx.stroke();
    }

    // ── The confining ring (faint, prismatic) ──
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = `hsla(${hueRot % 360}, 60%, 70%, ${0.10 + energy * 0.14})`;
    ctx.beginPath();
    ctx.arc(cx, cy, wallR, 0, Math.PI * 2);
    ctx.stroke();

    // ── Confined waveform — closed loop, rainbow per segment ──
    const N = 180;
    const pts = [];
    let maxReach = 0;
    for (let i = 0; i <= N; i++) {
        const a = (i / N) * Math.PI * 2;
        let dev = 0;
        if (playing) {
            const idx = Math.floor((i / N) * timeData.length) % timeData.length;
            dev = (timeData[idx] - 128) / 128;
        } else {
            dev = Math.sin(a * 5 + phase * 3) * 0.06;
        }
        let r = baseR * (1 + dev * 0.55 + energy * 0.35) + Math.sin(a * 3 + phase) * baseR * 0.05;
        r = Math.min(r, wallR - 2);
        maxReach = Math.max(maxReach, r / wallR);
        pts.push([cx + Math.cos(a + phase * 0.3) * r, cy + Math.sin(a + phase * 0.3) * r]);
    }

    // Soft multi-stop fill
    const grad = ctx.createRadialGradient(cx, cy, baseR * 0.15, cx, cy, wallR);
    grad.addColorStop(0.0, `hsla(${(hueRot) % 360}, 90%, 60%, ${0.10 + energy * 0.18})`);
    grad.addColorStop(0.5, `hsla(${(hueRot + 120) % 360}, 90%, 58%, ${0.07 + energy * 0.14})`);
    grad.addColorStop(1.0, `hsla(${(hueRot + 240) % 360}, 95%, 55%, ${0.03 + energy * 0.10})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
    ctx.closePath();
    ctx.fill();

    // Stroke each segment with its own hue → rainbow outline
    ctx.lineWidth = 1.8 + energy * 2.6;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 12 + energy * 24;
    for (let i = 0; i < N; i++) {
        const hue = (i / N * 360 + hueRot) % 360;
        ctx.strokeStyle = `hsla(${hue}, 95%, ${62 + energy * 18}%, ${0.75 + energy * 0.25})`;
        ctx.shadowColor = `hsla(${hue}, 95%, 60%, 0.7)`;
        ctx.beginPath();
        ctx.moveTo(pts[i][0], pts[i][1]);
        ctx.lineTo(pts[i + 1][0], pts[i + 1][1]);
        ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // Contact flare where the wave nears the wall
    if (maxReach > 0.93) {
        ctx.strokeStyle = `hsla(${(hueRot + 60) % 360}, 100%, 78%, ${(maxReach - 0.93) * 6})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(cx, cy, wallR, 0, Math.PI * 2);
        ctx.stroke();
    }

    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

let _lastTouchEnd = 0;
document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - _lastTouchEnd < 350) e.preventDefault();
    _lastTouchEnd = now;
}, { passive: false });
</script>

</body>
</html>
