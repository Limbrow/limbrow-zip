<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i can't get out · preview</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: #050507; width: 100%; height: 100vh; height: 100dvh;
        overflow: hidden; font-family: 'JetBrains Mono', ui-monospace, monospace;
    }
    #viz { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    .label {
        position: fixed; left: 0; right: 0;
        bottom: clamp(10px, 5vh, 26px);
        text-align: center; z-index: 2;
        font-size: clamp(10px, 3.6vw, 15px);
        font-weight: 500; letter-spacing: 0.06em;
        color: rgba(255,255,255,0.92);
        pointer-events: none;
    }
    .label small {
        display: block; margin-top: 5px;
        font-size: 0.6em; letter-spacing: 0.3em; text-transform: uppercase;
        color: rgba(255,255,255,0.4);
    }
</style>
</head>
<body>

<canvas id="viz"></canvas>
<div class="label">I can't get out</div>

<script>
// Silent teaser — a confined waveform pulsing against its ring, the same
// "can't get out" image as the live player but synthetic (no audio in cards).
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');
let DPR=1, VW=0, VH=0;
function fit(){ DPR=Math.min(window.devicePixelRatio||1,2); VW=window.innerWidth; VH=window.innerHeight;
    canvas.width=Math.floor(VW*DPR); canvas.height=Math.floor(VH*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener('resize', fit); fit();

// Site palette — refined red / gold / green / blue + metallic steel
const PAL=[[227,52,46],[242,194,77],[76,184,107],[58,123,213],[159,166,173]];
function pcol(t,al){ t=t-Math.floor(t); const n=PAL.length,f=t*n,i=Math.floor(f)%n,fr=f-Math.floor(f);
    const a=PAL[i],b=PAL[(i+1)%n]; const r=(a[0]+(b[0]-a[0])*fr)|0,g=(a[1]+(b[1]-a[1])*fr)|0,c=(a[2]+(b[2]-a[2])*fr)|0;
    return 'rgba('+r+','+g+','+c+','+al+')'; }

let phase=0, hueRot=0;
function frame(now){
    ctx.fillStyle='rgba(5,5,7,0.32)'; ctx.fillRect(0,0,VW,VH);
    const cx=VW/2, cy=VH*0.44;
    const baseR=Math.min(VW,VH)*0.22, wallR=baseR*1.46;
    const t=now*0.001;
    const energy=0.4+0.3*Math.sin(t*1.7)+0.15*Math.sin(t*4.3);
    const bass=0.45+0.4*Math.sin(t*1.1);
    phase  += 0.006 + bass*0.02;
    hueRot += 0.0011 + bass*0.005;

    ctx.globalCompositeOperation='lighter';

    // Spectral corona
    const NB=110;
    for(let i=0;i<NB;i++){
        const amp=0.12+0.5*Math.abs(Math.sin(i*0.4+phase*2.0))*energy + 0.12*Math.sin(i*1.3-phase);
        const a=(i/NB)*Math.PI*2+phase*0.3;
        const r0=wallR+3, r1=r0+Math.max(0.04,amp)*baseR*1.5;
        ctx.strokeStyle=pcol(i/NB+hueRot, 0.22+Math.max(0,amp)*0.6);
        ctx.lineWidth=(Math.PI*2*r0/NB)*0.6; ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*r0,cy+Math.sin(a)*r0);
        ctx.lineTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
        ctx.stroke();
    }

    ctx.lineWidth=1.5; ctx.strokeStyle=pcol(hueRot, 0.12+energy*0.16);
    ctx.beginPath(); ctx.arc(cx,cy,wallR,0,Math.PI*2); ctx.stroke();

    const N=160; const pts=[]; let maxReach=0;
    for(let i=0;i<=N;i++){
        const a=(i/N)*Math.PI*2;
        const dev=Math.sin(a*5+phase*3)*0.18*energy + Math.sin(a*9-phase*2)*0.10*energy;
        let r=baseR*(1+dev*0.6+energy*0.3)+Math.sin(a*3+phase)*baseR*0.05;
        r=Math.min(r,wallR-2); maxReach=Math.max(maxReach,r/wallR);
        pts.push([cx+Math.cos(a+phase*0.3)*r, cy+Math.sin(a+phase*0.3)*r]);
    }
    const grad=ctx.createRadialGradient(cx,cy,baseR*0.15,cx,cy,wallR);
    grad.addColorStop(0.0,pcol(hueRot,        0.10+energy*0.18));
    grad.addColorStop(0.5,pcol(hueRot+0.33,   0.07+energy*0.14));
    grad.addColorStop(1.0,pcol(hueRot+0.66,   0.03+energy*0.10));
    ctx.fillStyle=grad;
    ctx.beginPath(); pts.forEach((p,i)=> i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1])); ctx.closePath(); ctx.fill();

    ctx.lineWidth=1.8+energy*2.6; ctx.lineCap='round'; ctx.shadowBlur=12+energy*24;
    for(let i=0;i<N;i++){
        const c=pcol(i/N+hueRot, 0.78+energy*0.22);
        ctx.strokeStyle=c; ctx.shadowColor=c;
        ctx.beginPath(); ctx.moveTo(pts[i][0],pts[i][1]); ctx.lineTo(pts[i+1][0],pts[i+1][1]); ctx.stroke();
    }
    ctx.shadowBlur=0;
    if(maxReach>0.93){ ctx.strokeStyle=pcol(hueRot+0.15,(maxReach-0.93)*6); ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(cx,cy,wallR,0,Math.PI*2); ctx.stroke(); }

    ctx.globalCompositeOperation='source-over';
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>

</body>
</html>
