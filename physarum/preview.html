<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>physarum · preview</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; width: 100%; height: 100vh; height: 100dvh; overflow: hidden; }
    #stage {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }
</style>
</head>
<body>

<canvas id="stage"></canvas>

<script>
// Multi-species Physarum at low res. Auto-reseeds every 24s so the card
// cycles through colony regimes while each network has time to develop.
const display = document.getElementById('stage');
const dctx = display.getContext('2d');

const W = 200;
const H = Math.max(90, Math.floor(W * (window.innerHeight / window.innerWidth))) || W;
const N = W * H;

const buffer = document.createElement('canvas');
buffer.width = W; buffer.height = H;
const bctx = buffer.getContext('2d');
const imgData = bctx.createImageData(W, H);
const data8  = imgData.data;
const data32 = new Uint32Array(data8.buffer);

const MAX_SPECIES = 3;
const trail = [], scratch = [];
const total = new Float32Array(N);
for (let s = 0; s < MAX_SPECIES; s++) { trail.push(new Float32Array(N)); scratch.push(new Float32Array(N)); }
const colR = new Float32Array(MAX_SPECIES);
const colG = new Float32Array(MAX_SPECIES);
const colB = new Float32Array(MAX_SPECIES);

const N_AGENTS = 5200;
const aX = new Float32Array(N_AGENTS);
const aY = new Float32Array(N_AGENTS);
const aH = new Float32Array(N_AGENTS);
const aS = new Uint8Array(N_AGENTS);
const TWO_PI = Math.PI * 2;

function fitDisplay() {
    display.width = window.innerWidth;
    display.height = window.innerHeight;
    dctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fitDisplay);
fitDisplay();

let speciesCount = 2;
let SENSOR_DIST = 12, SENSOR_ANGLE = 0.5, TURN_ANGLE = 0.7, SPEED = 1.0, DECAY = 0.94, DEPOSIT = 26, REPEL = 0.6;

function setSpeciesColours(count) {
    const baseHue = Math.random();
    for (let s = 0; s < count; s++) {
        const hue = (baseHue + s / count + (Math.random() - 0.5) * 0.06) % 1;
        const h6 = hue * 6, c = 1, x = c * (1 - Math.abs((h6 % 2) - 1));
        let r, g, b;
        if (h6 < 1)      { r = c; g = x; b = 0; }
        else if (h6 < 2) { r = x; g = c; b = 0; }
        else if (h6 < 3) { r = 0; g = c; b = x; }
        else if (h6 < 4) { r = 0; g = x; b = c; }
        else if (h6 < 5) { r = x; g = 0; b = c; }
        else             { r = c; g = 0; b = x; }
        colR[s] = r; colG[s] = g; colB[s] = b;
    }
}

function reseed() {
    speciesCount = 2 + ((Math.random() < 0.5) ? 1 : 0);
    SENSOR_DIST  = 7 + Math.random() * 20;
    SENSOR_ANGLE = 0.25 + Math.random() * 0.65;
    TURN_ANGLE   = 0.30 + Math.random() * 0.80;
    SPEED        = 0.7 + Math.random() * 1.0;
    DECAY        = 0.910 + Math.random() * 0.055;
    DEPOSIT      = 18 + Math.random() * 30;
    REPEL        = 0.35 + Math.random() * 0.75;
    setSpeciesColours(speciesCount);
    for (let s = 0; s < MAX_SPECIES; s++) { trail[s].fill(0); scratch[s].fill(0); }
    const centres = [];
    for (let s = 0; s < speciesCount; s++) {
        centres.push({ cx: W * (0.22 + Math.random() * 0.56), cy: H * (0.22 + Math.random() * 0.56), r: Math.min(W, H) * (0.10 + Math.random() * 0.16) });
    }
    const per = (N_AGENTS / speciesCount) | 0;
    for (let i = 0; i < N_AGENTS; i++) {
        const s = Math.min(speciesCount - 1, (i / per) | 0);
        const c = centres[s];
        const rr = Math.sqrt(Math.random()) * c.r, ang = Math.random() * TWO_PI;
        aX[i] = c.cx + Math.cos(ang) * rr;
        aY[i] = c.cy + Math.sin(ang) * rr;
        aH[i] = Math.random() * TWO_PI;
        aS[i] = s;
    }
}
reseed();

function senseAt(s, x, y) {
    let ix = x | 0, iy = y | 0;
    if (ix < 0) ix += W; else if (ix >= W) ix -= W;
    if (iy < 0) iy += H; else if (iy >= H) iy -= H;
    const idx = iy * W + ix;
    const own = trail[s][idx];
    return own - REPEL * (total[idx] - own);
}

function stepAgents() {
    const sd = SENSOR_DIST, sa = SENSOR_ANGLE, ta = TURN_ANGLE, sp = SPEED, dep = DEPOSIT;
    for (let i = 0; i < N_AGENTS; i++) {
        const s = aS[i];
        const x = aX[i], y = aY[i], a = aH[i];
        const cf = Math.cos(a), sf = Math.sin(a);
        const cl = Math.cos(a - sa), sl = Math.sin(a - sa);
        const cr = Math.cos(a + sa), sr = Math.sin(a + sa);
        const fv = senseAt(s, x + cf * sd, y + sf * sd);
        const lv = senseAt(s, x + cl * sd, y + sl * sd);
        const rv = senseAt(s, x + cr * sd, y + sr * sd);
        let na = a;
        if (fv >= lv && fv >= rv) {}
        else if (lv > rv) na -= ta;
        else if (rv > lv) na += ta;
        else na += (Math.random() < 0.5 ? -ta : ta);
        let nx = x + Math.cos(na) * sp, ny = y + Math.sin(na) * sp;
        if (nx < 0) nx += W; else if (nx >= W) nx -= W;
        if (ny < 0) ny += H; else if (ny >= H) ny -= H;
        aX[i] = nx; aY[i] = ny; aH[i] = na;
        const idx = (ny | 0) * W + (nx | 0);
        const t = trail[s][idx] + dep;
        trail[s][idx] = t > 255 ? 255 : t;
    }
}

function decayDiffuse() {
    const k = (1 / 9) * DECAY;
    total.fill(0);
    for (let s = 0; s < speciesCount; s++) {
        const tr = trail[s], sc = scratch[s];
        for (let y = 1; y < H - 1; y++) {
            const yB = y * W, ym = (y - 1) * W, yp = (y + 1) * W;
            for (let x = 1; x < W - 1; x++) {
                sc[yB + x] = (
                    tr[ym + x - 1] + tr[ym + x] + tr[ym + x + 1] +
                    tr[yB + x - 1] + tr[yB + x] + tr[yB + x + 1] +
                    tr[yp + x - 1] + tr[yp + x] + tr[yp + x + 1]
                ) * k;
            }
        }
        for (let x = 0; x < W; x++) { sc[x] = tr[x] * DECAY; sc[(H - 1) * W + x] = tr[(H - 1) * W + x] * DECAY; }
        for (let y = 0; y < H; y++) { sc[y * W] = tr[y * W] * DECAY; sc[y * W + W - 1] = tr[y * W + W - 1] * DECAY; }
        tr.set(sc);
        for (let i = 0; i < N; i++) total[i] += tr[i];
    }
}

function paintImage() {
    for (let i = 0; i < N; i++) {
        let r = 0, g = 0, b = 0;
        for (let s = 0; s < speciesCount; s++) {
            const v = trail[s][i] * (1 / 255);
            if (v > 0.003) {
                const w = v * v * (3 - 2 * v);
                r += colR[s] * w; g += colG[s] * w; b += colB[s] * w;
            }
        }
        const ri = r > 1 ? 255 : (r * 255) | 0;
        const gi = g > 1 ? 255 : (g * 255) | 0;
        const bi = b > 1 ? 255 : (b * 255) | 0;
        data32[i] = (255 << 24) | (bi << 16) | (gi << 8) | ri;
    }
}

const RESEED_MS = 24000;
let lastReseed = performance.now();
function frame() {
    const now = performance.now();
    if (now - lastReseed > RESEED_MS) { reseed(); lastReseed = now; }
    stepAgents();
    decayDiffuse();
    paintImage();
    bctx.putImageData(imgData, 0, 0);
    dctx.drawImage(buffer, 0, 0, display.width, display.height);
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>

</body>
</html>
