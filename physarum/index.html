<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>physarum · limbrow.zip</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        background: #000;
        color: #e8e8e8;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    .back {
        position: fixed;
        top: 16px; left: 16px;
        z-index: 100;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 50%;
        color: rgba(255,255,255,0.92);
        text-decoration: none;
        font-size: 16px;
        line-height: 1;
        padding-bottom: 2px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    #stage {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    .credit {
        position: fixed;
        bottom: max(14px, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-size: 9px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.50);
        mix-blend-mode: difference;
        pointer-events: none;
        white-space: nowrap;
    }
</style>
</head>
<body>

<a class="back" href="/" aria-label="Back to grid">←</a>

<canvas id="stage"></canvas>

<div class="credit">physarum polycephalum · feed it</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// PHYSARUM — competing slime-mould colonies drawing a living network.
//
// Two or three species share the dish. Each agent senses its OWN species'
// trail (attraction) minus the FOREIGN trail (repulsion), so the colonies
// carve out territories with sharp veined boundaries — exactly the cellular
// frontiers real multi-species Physarum produces. Each species deposits on
// its own colour channel; the channels are blended additively, so a colony
// glows in its own hue and the seams between colonies flare white.
//
// Move the cursor / drag a finger to drop FOOD — a bright attractant that
// pulls every colony toward it. Release and watch the veins reroute and the
// network re-balance around where you fed it.
//
// Tap (no drag) to re-seed: new species count, palette, parameters, agents.
// ════════════════════════════════════════════════════════════════════════════

const display = document.getElementById('stage');
const dctx = display.getContext('2d');

const isMobile = window.matchMedia('(max-width: 600px)').matches;
const W = isMobile ? 260 : 420;
const H = Math.max(140, Math.floor(W * (window.innerHeight / window.innerWidth)));
const N = W * H;

const buffer = document.createElement('canvas');
buffer.width = W;
buffer.height = H;
const bctx = buffer.getContext('2d');
const imgData = bctx.createImageData(W, H);
const data8  = imgData.data;
const data32 = new Uint32Array(data8.buffer);

const SUB_STEPS = isMobile ? 1 : 2;

// ─── SPECIES STATE ─────────────────────────────────────────────────────────
// Up to 3 species. Each: own trail map, scratch buffer, colour, agents.
const MAX_SPECIES = 3;
const trail   = [];   // Float32Array per species
const scratch = [];   // Float32Array per species
const total   = new Float32Array(N);   // sum of all species each frame
const food    = new Float32Array(N);   // interactive attractant field
for (let s = 0; s < MAX_SPECIES; s++) {
    trail.push(new Float32Array(N));
    scratch.push(new Float32Array(N));
}

// Per-species colours (RGB 0..1)
const colR = new Float32Array(MAX_SPECIES);
const colG = new Float32Array(MAX_SPECIES);
const colB = new Float32Array(MAX_SPECIES);

// Agents stored flat, with a species index
const N_AGENTS = isMobile ? 5200 : 10500;
const aX  = new Float32Array(N_AGENTS);
const aY  = new Float32Array(N_AGENTS);
const aH  = new Float32Array(N_AGENTS);   // heading
const aS  = new Uint8Array(N_AGENTS);     // species index

const TWO_PI = Math.PI * 2;

function fitDisplay() {
    display.width = window.innerWidth;
    display.height = window.innerHeight;
    dctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fitDisplay);
fitDisplay();

// ─── PIECE PARAMS (randomised per reseed) ──────────────────────────────────
let speciesCount = 2;
let SENSOR_DIST  = 12;
let SENSOR_ANGLE = 0.5;
let TURN_ANGLE   = 0.7;
let SPEED        = 1.0;
let DECAY        = 0.94;
let DEPOSIT      = 26;
let REPEL        = 0.6;   // how strongly an agent avoids foreign trails

// Distinct, saturated hues spaced around the wheel, jittered per reseed
function setSpeciesColours(count) {
    const baseHue = Math.random();
    for (let s = 0; s < count; s++) {
        const hue = (baseHue + s / count + (Math.random() - 0.5) * 0.06) % 1;
        // HSV → RGB at full saturation, high value
        const h6 = hue * 6;
        const c = 1;
        const x = c * (1 - Math.abs((h6 % 2) - 1));
        let r, g, b;
        if (h6 < 1)      { r = c; g = x; b = 0; }
        else if (h6 < 2) { r = x; g = c; b = 0; }
        else if (h6 < 3) { r = 0; g = c; b = x; }
        else if (h6 < 4) { r = 0; g = x; b = c; }
        else if (h6 < 5) { r = x; g = 0; b = c; }
        else             { r = c; g = 0; b = x; }
        colR[s] = r; colG[s] = g; colB[s] = b;
    }
}

function reseed() {
    speciesCount = 2 + ((Math.random() < 0.5) ? 1 : 0);   // 2 or 3
    if (isMobile) speciesCount = 2;

    SENSOR_DIST  = 7 + Math.random() * 20;
    SENSOR_ANGLE = 0.25 + Math.random() * 0.65;
    TURN_ANGLE   = 0.30 + Math.random() * 0.80;
    SPEED        = 0.7 + Math.random() * 1.0;
    DECAY        = 0.910 + Math.random() * 0.055;
    DEPOSIT      = 18 + Math.random() * 30;
    REPEL        = 0.35 + Math.random() * 0.75;

    setSpeciesColours(speciesCount);

    for (let s = 0; s < MAX_SPECIES; s++) {
        trail[s].fill(0);
        scratch[s].fill(0);
    }
    food.fill(0);

    // Each species spawns from its own disk so territories start separated
    const centres = [];
    for (let s = 0; s < speciesCount; s++) {
        centres.push({
            cx: W * (0.22 + Math.random() * 0.56),
            cy: H * (0.22 + Math.random() * 0.56),
            r: Math.min(W, H) * (0.10 + Math.random() * 0.16),
        });
    }
    const per = (N_AGENTS / speciesCount) | 0;
    for (let i = 0; i < N_AGENTS; i++) {
        const s = Math.min(speciesCount - 1, (i / per) | 0);
        const c = centres[s];
        const rr = Math.sqrt(Math.random()) * c.r;
        const ang = Math.random() * TWO_PI;
        aX[i] = c.cx + Math.cos(ang) * rr;
        aY[i] = c.cy + Math.sin(ang) * rr;
        aH[i] = Math.random() * TWO_PI;
        aS[i] = s;
    }
}
reseed();

// ─── SENSING ───────────────────────────────────────────────────────────────
// Sensed value for species s at (x,y): own trail + food − repel·foreign.
// foreign = total − own, and total includes food already added below.
function senseAt(s, x, y) {
    let ix = x | 0, iy = y | 0;
    if (ix < 0) ix += W; else if (ix >= W) ix -= W;
    if (iy < 0) iy += H; else if (iy >= H) iy -= H;
    const idx = iy * W + ix;
    const own = trail[s][idx];
    const foreign = total[idx] - own;
    return own + food[idx] - REPEL * foreign;
}

function stepAgents() {
    const sd = SENSOR_DIST, sa = SENSOR_ANGLE, ta = TURN_ANGLE, sp = SPEED, dep = DEPOSIT;
    for (let i = 0; i < N_AGENTS; i++) {
        const s = aS[i];
        const x = aX[i], y = aY[i], a = aH[i];
        const cf = Math.cos(a),      sf = Math.sin(a);
        const cl = Math.cos(a - sa), sl = Math.sin(a - sa);
        const cr = Math.cos(a + sa), sr = Math.sin(a + sa);

        const fv = senseAt(s, x + cf * sd, y + sf * sd);
        const lv = senseAt(s, x + cl * sd, y + sl * sd);
        const rv = senseAt(s, x + cr * sd, y + sr * sd);

        let na = a;
        if (fv >= lv && fv >= rv) {
            // forward
        } else if (lv > rv) {
            na -= ta;
        } else if (rv > lv) {
            na += ta;
        } else {
            na += (Math.random() < 0.5 ? -ta : ta);
        }

        let nx = x + Math.cos(na) * sp;
        let ny = y + Math.sin(na) * sp;
        if (nx < 0) nx += W; else if (nx >= W) nx -= W;
        if (ny < 0) ny += H; else if (ny >= H) ny -= H;

        aX[i] = nx; aY[i] = ny; aH[i] = na;

        const idx = (ny | 0) * W + (nx | 0);
        const t = trail[s][idx] + dep;
        trail[s][idx] = t > 255 ? 255 : t;
    }
}

// ─── DECAY + DIFFUSE per species, and rebuild the total field ──────────────
function decayDiffuse() {
    const k = (1 / 9) * DECAY;
    total.fill(0);
    for (let s = 0; s < speciesCount; s++) {
        const tr = trail[s], sc = scratch[s];
        for (let y = 1; y < H - 1; y++) {
            const yB = y * W, ym = (y - 1) * W, yp = (y + 1) * W;
            for (let x = 1; x < W - 1; x++) {
                sc[yB + x] = (
                    tr[ym + x - 1] + tr[ym + x] + tr[ym + x + 1] +
                    tr[yB + x - 1] + tr[yB + x] + tr[yB + x + 1] +
                    tr[yp + x - 1] + tr[yp + x] + tr[yp + x + 1]
                ) * k;
            }
        }
        for (let x = 0; x < W; x++) {
            sc[x] = tr[x] * DECAY;
            sc[(H - 1) * W + x] = tr[(H - 1) * W + x] * DECAY;
        }
        for (let y = 0; y < H; y++) {
            sc[y * W] = tr[y * W] * DECAY;
            sc[y * W + W - 1] = tr[y * W + W - 1] * DECAY;
        }
        tr.set(sc);
        for (let i = 0; i < N; i++) total[i] += tr[i];
    }
    // Food fades faster than trails
    for (let i = 0; i < N; i++) food[i] *= 0.90;
}

// ─── RENDER — additive blend of species colours weighted by trail ──────────
function paintImage() {
    for (let i = 0; i < N; i++) {
        let r = 0, g = 0, b = 0;
        for (let s = 0; s < speciesCount; s++) {
            const v = trail[s][i] * (1 / 255);
            if (v > 0.003) {
                // Gamma-ish curve so faint trails stay dark, strong ones bloom
                const w = v * v * (3 - 2 * v);
                r += colR[s] * w;
                g += colG[s] * w;
                b += colB[s] * w;
            }
        }
        // Food shows as a soft white halo
        const fo = food[i] * (1 / 255);
        if (fo > 0.004) { r += fo; g += fo; b += fo; }

        const ri = r > 1 ? 255 : (r * 255) | 0;
        const gi = g > 1 ? 255 : (g * 255) | 0;
        const bi = b > 1 ? 255 : (b * 255) | 0;
        data32[i] = (255 << 24) | (bi << 16) | (gi << 8) | ri;
    }
}

function frame() {
    for (let k = 0; k < SUB_STEPS; k++) stepAgents();
    decayDiffuse();
    paintImage();
    bctx.putImageData(imgData, 0, 0);
    dctx.drawImage(buffer, 0, 0, display.width, display.height);
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ─── INTERACTION ───────────────────────────────────────────────────────────
// Drag → drop food (attracts all colonies). Tap without drag → reseed.
let downX = 0, downY = 0, downT = 0, moved = false;

function dropFood(clientX, clientY, amount) {
    const rect = display.getBoundingClientRect();
    const fx = ((clientX - rect.left) / rect.width) * W;
    const fy = ((clientY - rect.top) / rect.height) * H;
    const R = Math.max(3, Math.min(W, H) * 0.035);
    const R2 = R * R;
    const x0 = Math.max(0, (fx - R) | 0), x1 = Math.min(W - 1, (fx + R) | 0);
    const y0 = Math.max(0, (fy - R) | 0), y1 = Math.min(H - 1, (fy + R) | 0);
    for (let y = y0; y <= y1; y++) {
        const dy = y - fy;
        for (let x = x0; x <= x1; x++) {
            const dx = x - fx;
            const d2 = dx * dx + dy * dy;
            if (d2 < R2) {
                const f = (1 - d2 / R2) * amount;
                const idx = y * W + x;
                const v = food[idx] + f;
                food[idx] = v > 255 ? 255 : v;
            }
        }
    }
}

window.addEventListener('pointerdown', e => {
    if (e.target.closest('.back')) return;
    downX = e.clientX; downY = e.clientY; downT = performance.now(); moved = false;
});
window.addEventListener('pointermove', e => {
    if (e.buttons === 0 && e.pointerType === 'mouse') {
        // Hover feeds lightly so the piece responds to the cursor on desktop
        dropFood(e.clientX, e.clientY, 60);
        return;
    }
    // Dragging feeds strongly
    if (Math.abs(e.clientX - downX) > 6 || Math.abs(e.clientY - downY) > 6) moved = true;
    dropFood(e.clientX, e.clientY, 140);
}, { passive: true });
window.addEventListener('pointerup', e => {
    if (e.target.closest('.back')) return;
    const dt = performance.now() - downT;
    if (!moved && dt < 500) reseed();   // clean tap → new piece
});

let _lastTouchEnd = 0;
document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - _lastTouchEnd < 350) e.preventDefault();
    _lastTouchEnd = now;
}, { passive: false });
</script>

</body>
</html>
