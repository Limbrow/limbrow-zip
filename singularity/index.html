<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>singularity · limbrow.zip</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        background: #000;
        color: #e8e8e8;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    .back {
        position: fixed;
        top: 16px; left: 16px;
        z-index: 100;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 50%;
        color: rgba(255,255,255,0.9);
        text-decoration: none;
        font-size: 16px; line-height: 1; padding-bottom: 2px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    #gl { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; cursor: grab; }
    #gl:active { cursor: grabbing; }

    .credit {
        position: fixed;
        bottom: max(14px, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        mix-blend-mode: difference; pointer-events: none; white-space: nowrap;
    }

    .err {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center; padding: 40px;
        text-align: center; line-height: 1.6; font-size: 13px; color: #ccc;
    }
</style>
</head>
<body>

<a class="back" href="/" aria-label="Back to grid">←</a>

<canvas id="gl"></canvas>

<div class="credit">schwarzschild geodesics · drag to orbit · scroll to fall</div>

<div class="err" id="err">
    WebGL is required to view this artwork.<br>
    On Chrome visit <code>chrome://gpu</code> and enable hardware acceleration.
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// SINGULARITY — a Schwarzschild black hole with real gravitational lensing.
//
// For every pixel a photon is traced backwards from the camera through curved
// spacetime. The null geodesic is integrated with the standard field
// acceleration  a = −3/2 · h² · x / |x|⁵  (rs = 1 units; h = |x × v| is the
// photon's conserved specific angular momentum). That single line of physics
// reproduces the whole structure: the photon sphere at r = 1.5, the Einstein
// ring, the ~2.6× shadow, and the way the far side of the accretion disk is
// bent up and over the top of the hole.
//
// The disk is an emissive equatorial annulus shaded with a blackbody-ish
// temperature ramp (hot blue-white inner → orange outer), Keplerian rotation
// v(r)=√(M/r) with relativistic Doppler beaming — the side turning toward you
// flares bright and blue, the receding side dims and reddens — and procedural
// turbulence. The disk is semi-transparent so the lensed back of it arcs over
// the top, the Gargantua geometry, computed rather than faked.
//
// Behind it, a procedural star field the lensing visibly warps around the
// shadow. Drag to orbit · scroll / pinch to change orbital radius · it drifts
// on its own when released.
// ════════════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('gl');
const gl =
       canvas.getContext('webgl2', { antialias: false, preserveDrawingBuffer: false })
    || canvas.getContext('webgl',  { antialias: false })
    || canvas.getContext('experimental-webgl');

if (!gl) {
    document.getElementById('err').style.display = 'flex';
} else {

const isMobile = window.matchMedia('(max-width: 600px)').matches;

const STEPS = isMobile ? 210 : 340;
const RENDER_SCALE = isMobile ? 0.78 : 0.85;

const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const FS = `
precision highp float;

uniform vec2  u_res;
uniform float u_time;
uniform vec3  u_camPos;
uniform mat3  u_camBasis;
uniform float u_focal;

const float HORIZON = 1.0;
const float R_IN    = 2.6;
const float R_OUT   = 9.0;
const float R_ESC   = 60.0;
const int   MAX_STEPS = ${STEPS};

float hash11(float p){ p = fract(p*0.1031); p *= p+33.33; p *= p+p; return fract(p); }
float hash31(vec3 p){
    p = fract(p*0.1031);
    p += dot(p, p.yzx+33.33);
    return fract((p.x+p.y)*p.z);
}
float vnoise(vec3 p){
    vec3 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    float n000=hash31(i+vec3(0,0,0)), n100=hash31(i+vec3(1,0,0));
    float n010=hash31(i+vec3(0,1,0)), n110=hash31(i+vec3(1,1,0));
    float n001=hash31(i+vec3(0,0,1)), n101=hash31(i+vec3(1,0,1));
    float n011=hash31(i+vec3(0,1,1)), n111=hash31(i+vec3(1,1,1));
    return mix(mix(mix(n000,n100,f.x),mix(n010,n110,f.x),f.y),
               mix(mix(n001,n101,f.x),mix(n011,n111,f.x),f.y), f.z);
}
float fbm(vec3 p){ float a=0.5, s=0.0; for(int i=0;i<5;i++){ s+=a*vnoise(p); p*=2.02; a*=0.5; } return s; }

vec3 stars(vec3 dir){
    float neb = smoothstep(0.55, 1.0, fbm(dir*3.0 + 11.0));
    vec3 col = mix(vec3(0.02,0.03,0.06), vec3(0.10,0.06,0.16), neb) * 0.6;
    for(float s=0.0; s<3.0; s+=1.0){
        float scale = 60.0 + s*120.0;
        vec3 g = dir*scale, id = floor(g);
        float h = hash31(id + s*17.0);
        if(h > 0.86){
            vec3 fp = fract(g) - 0.5;
            float d = length(fp);
            float bright = (h-0.86)/0.14;
            float star = smoothstep(0.16, 0.0, d) * bright;
            float tw = 0.6 + 0.4*sin(u_time*1.5 + h*60.0);
            vec3 sc = mix(vec3(0.6,0.75,1.0), vec3(1.0,0.85,0.6), hash11(h*7.0));
            col += sc * star * tw * 1.4;
        }
    }
    return col;
}

vec3 diskEmission(vec3 p, vec3 photonDir, out float alpha){
    float r = length(p.xz);
    if(r < R_IN || r > R_OUT){ alpha = 0.0; return vec3(0.0); }
    float tNorm = (r - R_IN) / (R_OUT - R_IN);
    vec3 hot  = vec3(0.75, 0.85, 1.10);
    vec3 mid  = vec3(1.10, 0.70, 0.30);
    vec3 cool = vec3(0.65, 0.16, 0.06);
    vec3 base = (tNorm < 0.5) ? mix(hot, mid, tNorm*2.0) : mix(mid, cool, (tNorm-0.5)*2.0);
    float bright = 1.7 * pow(1.0 - tNorm, 1.3) + 0.25;
    float ang = atan(p.z, p.x);
    float swirl = ang*2.0 - 6.0/sqrt(r) + u_time*0.6;
    float tex = fbm(vec3(cos(swirl)*r*0.5, sin(swirl)*r*0.5, r*0.6 - u_time*0.3));
    tex = 0.55 + 0.85*tex;
    bright *= tex;
    float M = 0.5;
    float speed = min(sqrt(M / r), 0.7);
    vec3 vdir = normalize(vec3(-p.z, 0.0, p.x));
    float cosA = dot(vdir, -normalize(photonDir));
    float gamma = 1.0 / sqrt(1.0 - speed*speed);
    float doppler = 1.0 / (gamma * (1.0 - speed*cosA));
    float beam = pow(doppler, 3.0);
    vec3 shift = mix(vec3(1.0,0.55,0.35), vec3(0.55,0.75,1.2), clamp((doppler-0.6)/1.2, 0.0, 1.0));
    float edge = smoothstep(0.0, 0.10, tNorm) * smoothstep(0.0, 0.10, 1.0 - tNorm);
    alpha = clamp(0.92 * edge * tex, 0.0, 1.0);
    return base * shift * bright * beam * edge;
}

vec3 tonemap(vec3 x){
    x *= 0.9;
    return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0);
}

void main(){
    // Normalise by the SMALLER screen dimension so the hole stays centred and
    // correctly sized on any aspect ratio — crucial for tall phone screens.
    float m = min(u_res.x, u_res.y);
    vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / m;

    vec3 pos = u_camPos;
    vec3 vel = normalize(u_camBasis * vec3(uv, u_focal));
    vec3 h = cross(pos, vel);
    float h2 = dot(h, h);

    vec3 col = vec3(0.0);
    float trans = 1.0;
    vec3 prevPos = pos;

    for(int i=0; i<MAX_STEPS; i++){
        float r = length(pos);
        // Step grows fast far from the hole (so a far camera still reaches it
        // within the step budget) and stays fine near it for an accurate ring.
        float dt = clamp(0.03 * (r - HORIZON) + 0.010, 0.012, 1.2);

        prevPos = pos;
        vec3 acc = -1.5 * h2 * pos / pow(dot(pos,pos), 2.5);
        vec3 newPos = pos + vel*dt + 0.5*acc*dt*dt;
        vel += acc*dt;
        pos = newPos;

        if(prevPos.y * pos.y < 0.0){
            float t = prevPos.y / (prevPos.y - pos.y);
            vec3 cp = mix(prevPos, pos, t);
            float a;
            vec3 e = diskEmission(cp, vel, a);
            if(a > 0.0){ col += trans * e; trans *= (1.0 - a); }
        }

        float rr = length(pos);
        if(rr < HORIZON){ trans = 0.0; break; }                  // shadow blocks the sky
        if(trans < 0.02){ break; }
        // Only escape once the photon is heading OUTWARD — otherwise a camera
        // that starts beyond R_ESC (zoomed far out) would escape instantly.
        if(rr > R_ESC && dot(pos, vel) > 0.0){ break; }
    }

    // Any remaining transmittance shows the background sky — covers escaped
    // rays and rays that ran out of steps far from the hole.
    col += trans * stars(normalize(vel));

    col = tonemap(col);
    float v = 1.0 - 0.25*dot(uv, uv);
    col *= v;
    gl_FragColor = vec4(col, 1.0);
}
`;

function compile(src, type){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(VS, gl.VERTEX_SHADER));
gl.attachShader(prog, compile(FS, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = {
    res:   gl.getUniformLocation(prog, 'u_res'),
    time:  gl.getUniformLocation(prog, 'u_time'),
    cam:   gl.getUniformLocation(prog, 'u_camPos'),
    basis: gl.getUniformLocation(prog, 'u_camBasis'),
    focal: gl.getUniformLocation(prog, 'u_focal'),
};

// ─── CAMERA ────────────────────────────────────────────────────────────────
// Mobile pulls back with a wider lens by default so the whole ring + disk
// reads on a small vertical screen.
let az = 0.6;
let el = isMobile ? 0.30 : 0.16;
let dist = isMobile ? 17.0 : 15.0;
const FOCAL = isMobile ? 1.12 : 1.5;
let vAz = 0.0004, vEl = 0.0;
let dragging = false, lastX = 0, lastY = 0;

function resize(){
    const w = Math.floor(window.innerWidth * RENDER_SCALE);
    const h = Math.floor(window.innerHeight * RENDER_SCALE);
    canvas.width = w; canvas.height = h;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    gl.viewport(0, 0, w, h);
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('pointerdown', e => {
    if (e.target.closest('.back')) return;
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    vAz = 0; vEl = 0;
    canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    az -= dx * 0.005;
    el += dy * 0.005;
    el = Math.max(-1.45, Math.min(1.45, el));
    vAz = -dx * 0.0004; vEl = dy * 0.0004;
});
canvas.addEventListener('pointerup', () => { dragging = false; });
canvas.addEventListener('pointercancel', () => { dragging = false; });

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    dist *= Math.exp(e.deltaY * 0.0011);
    dist = Math.max(6.0, Math.min(52.0, dist));
}, { passive: false });

let pinchD = 0;
canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 2){
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (pinchD){ dist *= pinchD / d; dist = Math.max(6.0, Math.min(52.0, dist)); }
        pinchD = d; e.preventDefault();
    }
}, { passive: false });
canvas.addEventListener('touchend', () => { pinchD = 0; });

// ─── RENDER LOOP ───────────────────────────────────────────────────────────
const t0 = performance.now();
function frame(now){
    if (!dragging){
        az += vAz; el += vEl;
        el = Math.max(-1.45, Math.min(1.45, el));
        vAz += (0.0004 - vAz) * 0.01;
        vEl *= 0.96;
    }

    const ce = Math.cos(el), se = Math.sin(el);
    const ca = Math.cos(az), sa = Math.sin(az);
    const camPos = [ dist*ce*ca, dist*se, dist*ce*sa ];

    const fwd = norm([ -camPos[0], -camPos[1], -camPos[2] ]);
    let right = norm(cross(fwd, [0,1,0]));
    if (!isFinite(right[0])) right = [1,0,0];
    const up = cross(right, fwd);

    const basis = [
        right[0], right[1], right[2],
        up[0],    up[1],    up[2],
        fwd[0],   fwd[1],   fwd[2],
    ];

    gl.uniform2f(U.res, canvas.width, canvas.height);
    gl.uniform1f(U.time, (now - t0) * 0.001);
    gl.uniform3f(U.cam, camPos[0], camPos[1], camPos[2]);
    gl.uniformMatrix3fv(U.basis, false, basis);
    gl.uniform1f(U.focal, FOCAL);

    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(frame);
}

function cross(a, b){ return [ a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0] ]; }
function norm(a){ const l = Math.hypot(a[0], a[1], a[2]) || 1; return [ a[0]/l, a[1]/l, a[2]/l ]; }

requestAnimationFrame(frame);

let _lastTouchEnd = 0;
document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - _lastTouchEnd < 350) e.preventDefault();
    _lastTouchEnd = now;
}, { passive: false });

}
</script>

</body>
</html>
