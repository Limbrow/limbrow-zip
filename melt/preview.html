<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>melt · preview</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: #000;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
    }
    #stage {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }
</style>
</head>
<body>

<canvas id="stage"></canvas>

<script>
// ════════════════════════════════════════════════════════════════════════════
// MELT PREVIEW — slow auto-cycle through DRIP → DRAG → SHIFT → MOSH.
// Tighter buffer and lighter compute since multiple cards may render at once.
// ════════════════════════════════════════════════════════════════════════════

const display = document.getElementById('stage');
const dctx = display.getContext('2d');

const W = 180;
const H = Math.floor(W * (window.innerHeight / window.innerWidth)) || W;

const buffer = document.createElement('canvas');
buffer.width = W; buffer.height = H;
const bctx = buffer.getContext('2d');
const imgData = bctx.createImageData(W, H);
const data = imgData.data;

function fitDisplay() {
    display.width = window.innerWidth;
    display.height = window.innerHeight;
    dctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fitDisplay);
fitDisplay();

// Pick a random seed offset so multiple cards differ
const seed = Math.random() * 1000;

const MODES = ['DRIP', 'DRAG', 'SHIFT', 'MOSH'];
const MODE_MS = 4500;

const PAL_A = [0.50, 0.45, 0.60];
const PAL_B = [0.55, 0.50, 0.50];
const PAL_C = [1.00, 1.00, 0.90];
const PAL_D = [0.00, 0.33, 0.67];
const TWO_PI = 6.283185307;

function paintBase(time) {
    const tt = time * 0.00035 + seed;
    for (let y = 0; y < H; y++) {
        const ny = (y / H) * 2 - 1;
        for (let x = 0; x < W; x++) {
            const nx = (x / W) * 2 - 1;
            const v =
                Math.sin(nx * 5.0 + tt * 1.0) * 0.40 +
                Math.cos(ny * 4.0 + tt * 1.3) * 0.30 +
                Math.sin((nx + ny) * 3.5 + tt * 0.7) * 0.20 +
                Math.cos((nx - ny) * 6.0 - tt * 0.5) * 0.10;
            const v01 = v * 0.5 + 0.5;
            const r = (PAL_A[0] + PAL_B[0] * Math.cos(TWO_PI * (PAL_C[0] * v01 + PAL_D[0] + tt * 0.04))) * 255;
            const g = (PAL_A[1] + PAL_B[1] * Math.cos(TWO_PI * (PAL_C[1] * v01 + PAL_D[1] + tt * 0.04))) * 255;
            const b = (PAL_A[2] + PAL_B[2] * Math.cos(TWO_PI * (PAL_C[2] * v01 + PAL_D[2] + tt * 0.04))) * 255;
            const i = (y * W + x) * 4;
            data[i]     = r < 0 ? 0 : r > 255 ? 255 : r | 0;
            data[i + 1] = g < 0 ? 0 : g > 255 ? 255 : g | 0;
            data[i + 2] = b < 0 ? 0 : b > 255 ? 255 : b | 0;
            data[i + 3] = 255;
        }
    }
}

function sortVertical(threshold) {
    for (let x = 0; x < W; x++) {
        let runStart = -1;
        for (let y = 0; y <= H; y++) {
            let pass = false;
            if (y < H) {
                const i = (y * W + x) * 4;
                pass = data[i] + data[i + 1] + data[i + 2] > threshold;
            }
            if (pass) {
                if (runStart === -1) runStart = y;
            } else {
                if (runStart !== -1 && y - runStart > 2) sortRunV(x, runStart, y - 1);
                runStart = -1;
            }
        }
    }
}
function sortRunV(x, y0, y1) {
    const len = y1 - y0 + 1;
    const arr = new Array(len);
    for (let i = 0; i < len; i++) {
        const di = ((y0 + i) * W + x) * 4;
        arr[i] = [data[di] + data[di+1] + data[di+2], data[di], data[di+1], data[di+2]];
    }
    arr.sort((a, b) => a[0] - b[0]);
    for (let i = 0; i < len; i++) {
        const di = ((y0 + i) * W + x) * 4;
        data[di]   = arr[i][1];
        data[di+1] = arr[i][2];
        data[di+2] = arr[i][3];
    }
}

function sortHorizontal(threshold) {
    for (let y = 0; y < H; y++) {
        let runStart = -1;
        for (let x = 0; x <= W; x++) {
            let pass = false;
            if (x < W) {
                const i = (y * W + x) * 4;
                pass = data[i] + data[i + 1] + data[i + 2] > threshold;
            }
            if (pass) {
                if (runStart === -1) runStart = x;
            } else {
                if (runStart !== -1 && x - runStart > 2) sortRunH(y, runStart, x - 1);
                runStart = -1;
            }
        }
    }
}
function sortRunH(y, x0, x1) {
    const len = x1 - x0 + 1;
    const arr = new Array(len);
    for (let i = 0; i < len; i++) {
        const di = (y * W + (x0 + i)) * 4;
        arr[i] = [data[di] + data[di+1] + data[di+2], data[di], data[di+1], data[di+2]];
    }
    arr.sort((a, b) => a[0] - b[0]);
    for (let i = 0; i < len; i++) {
        const di = (y * W + (x0 + i)) * 4;
        data[di]   = arr[i][1];
        data[di+1] = arr[i][2];
        data[di+2] = arr[i][3];
    }
}

function shiftChannels(amount) {
    const red  = new Uint8ClampedArray(W * H);
    const blue = new Uint8ClampedArray(W * H);
    for (let i = 0, j = 0; i < data.length; i += 4, j++) {
        red[j] = data[i]; blue[j] = data[i+2];
    }
    for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
            const xR = Math.max(0, Math.min(W - 1, x - amount));
            const xB = Math.max(0, Math.min(W - 1, x + amount));
            const di = (y * W + x) * 4;
            data[di]   = red[y * W + xR];
            data[di+2] = blue[y * W + xB];
        }
    }
}

let t0 = performance.now();
function frame(now) {
    const t = now - t0;
    const mode = MODES[Math.floor(t / MODE_MS) % MODES.length];
    paintBase(t);
    const slow = t * 0.0008;
    if (mode === 'DRIP') {
        sortVertical(340 + Math.sin(slow) * 110);
    } else if (mode === 'DRAG') {
        sortHorizontal(340 + Math.sin(slow) * 110);
    } else if (mode === 'SHIFT') {
        shiftChannels(3 + ((Math.sin(slow * 0.7) * 0.5 + 0.5) * 9) | 0);
    } else {
        sortVertical(320 + Math.sin(slow) * 130);
        sortHorizontal(360 + Math.cos(slow * 1.3) * 110);
        shiftChannels(2 + ((Math.sin(slow * 0.9) * 0.5 + 0.5) * 6) | 0);
    }
    bctx.putImageData(imgData, 0, 0);
    dctx.drawImage(buffer, 0, 0, display.width, display.height);
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>

</body>
</html>
