<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>limbrow.zip</title>
    <meta name="description" content="Netart archive by limbrow.">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <meta property="og:title" content="limbrow.zip">
    <meta property="og:description" content="Netart archive by limbrow.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://limbrow.zip">
    <meta property="og:image" content="avatar.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --card: #0f0f0f;
            --line: #1a1a1a;
            --text: #e8e8e8;
            --muted: #888;
            --dim: #444;
            --accent: #fff;
            --gap: 4px;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ── IDENTITY HEADER ── */
        header {
            padding: 28px 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            display: block;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            background: #000;
            border: 0;
            padding: 0;
            transition: opacity 0.2s ease;
            flex-shrink: 0;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar:hover { opacity: 0.85; }
        .avatar:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
        }

        .handle {
            font-size: 13px;
            color: var(--text);
            letter-spacing: 0.02em;
            font-weight: 400;
        }
        .handle .slash { color: var(--dim); }
        .handle .ext { color: var(--muted); }

        .tagline {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: -8px;
        }

        /* ── AVATAR FULLSCREEN OVERLAY ── */
        .avatar-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            cursor: pointer;
            padding: 24px;
        }
        .avatar-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .avatar-overlay img {
            width: 100%;
            max-width: 480px;
            height: auto;
            border-radius: 50%;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .avatar-overlay.open img {
            transform: scale(1);
        }

        /* ── GRID — IG-style 3 columns, infinite scroll ── */
        main {
            padding: 0 var(--gap) 48px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--gap);
        }

        @media (max-width: 480px) {
            :root { --gap: 2px; }
            main { padding: 0 var(--gap) 24px; }
        }

        /* ── CARDS ── */
        .card {
            display: block;
            background: var(--card);
            overflow: hidden;
            text-decoration: none;
            position: relative;
            aspect-ratio: 1 / 1;                /* default = perfect square */
            transition: transform 0.2s ease;
        }

        /* Spec for "break the rules" posts. Set in posts.js with width/height in cells. */
        .card.span-2-cols { grid-column: span 2; }
        .card.span-2-rows { grid-row: span 2; }
        .card.span-2x2    { grid-column: span 2; grid-row: span 2; }

        /* Non-square allowed via --aspect when really needed */
        .card[style*="--aspect"] {
            aspect-ratio: 1 / var(--aspect);
        }

        .card .preview {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .card .preview iframe {
            position: absolute;
            top: 0; left: 0;
            border: 0;
            transform-origin: top left;
            pointer-events: none;
            background: #000;
            width: calc(100% / var(--scale, 0.4));
            height: calc(100% / var(--scale, 0.4));
            transform: scale(var(--scale, 0.4));
        }

        /* Hover halo — minimal */
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 0 0 rgba(255,255,255,0.15);
            transition: box-shadow 0.2s ease;
            pointer-events: none;
        }
        .card:hover::after { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); }

        /* ── FOOTER MARK ── */
        footer {
            padding: 48px 16px 32px;
            text-align: center;
            font-size: 9px;
            color: var(--dim);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* Touch devices: iframes always visible (no hover state) */
        @media (hover: none) {
            .card::after { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <button class="avatar" id="avatar-btn" aria-label="View avatar">
            <img src="avatar.jpg" alt="">
        </button>
        <div class="handle">limbrow<span class="slash">.</span><span class="ext">zip</span></div>
    </header>

    <div class="avatar-overlay" id="avatar-overlay" aria-hidden="true">
        <img src="avatar.jpg" alt="">
    </div>

    <main>
        <div class="grid" id="grid"></div>
    </main>

    <footer>limbrow.zip</footer>

    <script type="module">
        import { posts } from './posts.js';

        const grid = document.getElementById('grid');

        function makeCard(post) {
            const card = document.createElement('a');
            card.className = 'card';
            card.href = `/p/${post.slug}/`;
            card.setAttribute('aria-label', `Open ${post.slug}`);

            // Special span overrides — for hero / breaking-the-grid posts
            if (post.span === '2cols') card.classList.add('span-2-cols');
            else if (post.span === '2rows') card.classList.add('span-2-rows');
            else if (post.span === '2x2') card.classList.add('span-2x2');

            // Aspect override only if absolutely needed
            if (post.aspect) card.style.setProperty('--aspect', post.aspect);
            card.style.setProperty('--scale', post.scale ?? 0.4);

            card.innerHTML = `
                <div class="preview">
                    <iframe loading="lazy" tabindex="-1" aria-hidden="true" scrolling="no"></iframe>
                </div>
            `;

            const iframe = card.querySelector('iframe');
            const previewUrl = post.preview
                ? `/p/${post.slug}/${post.preview}`
                : `/p/${post.slug}/`;
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting && !iframe.src) {
                        iframe.src = previewUrl;
                        io.disconnect();
                    }
                });
            }, { rootMargin: '400px' });
            io.observe(card);

            return card;
        }

        // Newest first
        posts
            .slice()
            .sort((a, b) => b.date.localeCompare(a.date))
            .forEach(post => grid.appendChild(makeCard(post)));

        // Avatar fullscreen
        const avatarBtn = document.getElementById('avatar-btn');
        const overlay = document.getElementById('avatar-overlay');
        function openAvatar() {
            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }
        function closeAvatar() {
            overlay.classList.remove('open');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }
        avatarBtn.addEventListener('click', openAvatar);
        overlay.addEventListener('click', closeAvatar);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('open')) closeAvatar();
        });
    </script>
</body>
</html>
