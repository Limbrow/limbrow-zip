<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>limbrow.zip</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <meta property="og:title" content="limbrow.zip">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://limbrow.zip">
    <meta property="og:image" content="avatar.jpg">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --card: #0f0f0f;
            --line: #1a1a1a;
        }

        html, body {
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* AVATAR */
        .avatar {
            display: block;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            margin: 24px auto 20px;
            cursor: pointer;
            overflow: hidden;
            background: #000;
            border: 0;
            padding: 0;
            transition: opacity 0.2s ease;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .avatar:hover { opacity: 0.85; }
        .avatar:focus-visible {
            outline: 2px solid #fff;
            outline-offset: 4px;
        }

        /* AVATAR FULLSCREEN OVERLAY */
        .avatar-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            cursor: pointer;
            padding: 24px;
        }
        .avatar-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .avatar-overlay img {
            width: 100%;
            max-width: 480px;
            height: auto;
            border-radius: 50%;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 0 80px rgba(255, 255, 255, 0.05);
        }
        .avatar-overlay.open img {
            transform: scale(1);
        }

        /* MASONRY GRID */
        main {
            padding: 0 12px 48px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            column-count: 3;
            column-gap: 8px;
        }

        @media (max-width: 900px) {
            .grid { column-count: 2; }
        }
        @media (max-width: 480px) {
            .grid { column-count: 1; }
            main { padding: 0 8px 32px; }
        }

        .card {
            display: block;
            margin-bottom: 8px;
            background: var(--card);
            border-radius: 4px;
            overflow: hidden;
            text-decoration: none;
            position: relative;
            break-inside: avoid;
            -webkit-column-break-inside: avoid;
            page-break-inside: avoid;
            transition: outline-color 0.2s ease;
            outline: 1px solid transparent;
        }

        .card .preview {
            position: relative;
            width: 100%;
            background: #000;
            overflow: hidden;
            aspect-ratio: 1 / var(--aspect, 1);
        }

        .card .preview iframe {
            position: absolute;
            top: 0; left: 0;
            border: 0;
            transform-origin: top left;
            pointer-events: none;
            background: #000;
            width: calc(100% / var(--scale, 0.4));
            height: calc(100% / var(--scale, 0.4));
            transform: scale(var(--scale, 0.4));
        }

        .card:hover {
            outline-color: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>

    <button class="avatar" id="avatar-btn" aria-label="View avatar">
        <img src="avatar.jpg" alt="">
    </button>

    <div class="avatar-overlay" id="avatar-overlay" aria-hidden="true">
        <img src="avatar.jpg" alt="">
    </div>

    <main>
        <div class="grid" id="grid"></div>
    </main>

    <script type="module">
        import { posts } from './posts.js';

        const grid = document.getElementById('grid');

        function makeCard(post) {
            const card = document.createElement('a');
            card.className = 'card';
            card.href = `/p/${post.slug}/`;
            card.style.setProperty('--aspect', post.aspect ?? 1);
            card.style.setProperty('--scale', post.scale ?? 0.4);

            card.innerHTML = `
                <div class="preview">
                    <iframe loading="lazy" tabindex="-1" aria-hidden="true" scrolling="no"></iframe>
                </div>
            `;

            const iframe = card.querySelector('iframe');
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting && !iframe.src) {
                        iframe.src = `/p/${post.slug}/`;
                        io.disconnect();
                    }
                });
            }, { rootMargin: '400px' });
            io.observe(card);

            return card;
        }

        posts
            .slice()
            .sort((a, b) => b.date.localeCompare(a.date))
            .forEach(post => grid.appendChild(makeCard(post)));

        // Avatar fullscreen
        const avatarBtn = document.getElementById('avatar-btn');
        const overlay = document.getElementById('avatar-overlay');

        function openAvatar() {
            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }
        function closeAvatar() {
            overlay.classList.remove('open');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        avatarBtn.addEventListener('click', openAvatar);
        overlay.addEventListener('click', closeAvatar);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('open')) {
                closeAvatar();
            }
        });
    </script>
</body>
</html>
