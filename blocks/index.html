<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>blocks · limbrow.zip</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        background: #000;
        color: #e8e8e8;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    .back {
        position: fixed;
        top: 16px; left: 16px;
        z-index: 100;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 50%;
        color: rgba(255,255,255,0.90);
        text-decoration: none;
        font-size: 16px;
        line-height: 1;
        padding-bottom: 2px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    #stage {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }
</style>
</head>
<body>

<a class="back" href="/" aria-label="Back to grid">←</a>

<canvas id="stage"></canvas>

<script>
// ════════════════════════════════════════════════════════════════════════════
// BLOCKS — flat color, pixel-wipe transitions.
//
// A low-res buffer of flat color regions that is continuously overwritten by
// "wipes": rectangular regions of a new flat color that reveal pixel-by-pixel
// along one of 8 axes (horizontal ←→, vertical ↑↓, diagonal × 4). Two or three
// wipes are usually in flight at once, at different scales and speeds, so the
// composition never settles.
//
// Tap anywhere to drop a new wipe at that point.
// ════════════════════════════════════════════════════════════════════════════

const display = document.getElementById('stage');
const dctx = display.getContext('2d');

const isMobile = window.matchMedia('(max-width: 600px)').matches;
const W = isMobile ? 220 : 320;
const H = Math.max(60, Math.floor(W * (window.innerHeight / window.innerWidth)));

const buffer = document.createElement('canvas');
buffer.width = W;
buffer.height = H;
const bctx = buffer.getContext('2d');
const imgData = bctx.createImageData(W, H);
const data = imgData.data;

function fitDisplay() {
    display.width = window.innerWidth;
    display.height = window.innerHeight;
    dctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fitDisplay);
fitDisplay();

// ─── PALETTE (6 refined flats — vivid digital, Asendorf-leaning) ───────────
const PALETTE = [
    [255,  45, 112],   // hot magenta
    [ 45, 238, 240],   // electric cyan
    [248, 223,  58],   // saturated yellow
    [123,  58, 255],   // violet
    [ 24,  28,  47],   // deep navy
    [240, 234, 219],   // warm off-white
];

// ─── 8 DIRECTIONS for pixel-wipe phase ─────────────────────────────────────
//   0  H →     1  H ←
//   2  V ↓     3  V ↑
//   4  ↘       5  ↖
//   6  ↗       7  ↙
function getPhase(direction, x, y, w, h) {
    switch (direction) {
        case 0: return x / (w - 1 || 1);
        case 1: return 1 - x / (w - 1 || 1);
        case 2: return y / (h - 1 || 1);
        case 3: return 1 - y / (h - 1 || 1);
        case 4: return (x + y) / ((w + h - 2) || 1);
        case 5: return 1 - (x + y) / ((w + h - 2) || 1);
        case 6: return ((w - 1 - x) + y) / ((w + h - 2) || 1);
        case 7: return (x + (h - 1 - y)) / ((w + h - 2) || 1);
    }
    return 0;
}

// ─── INITIAL FILL ──────────────────────────────────────────────────────────
function fillRect(r, colorIdx) {
    const c = PALETTE[colorIdx];
    for (let y = r.y; y < r.y + r.h; y++) {
        for (let x = r.x; x < r.x + r.w; x++) {
            const idx = (y * W + x) * 4;
            data[idx]     = c[0];
            data[idx + 1] = c[1];
            data[idx + 2] = c[2];
            data[idx + 3] = 255;
        }
    }
}
fillRect({ x: 0, y: 0, w: W, h: H }, 4);  // start on near-black

// ─── WIPES ─────────────────────────────────────────────────────────────────
const activeWipes = [];
let lastColorIdx = 4;

function chooseColorIdx() {
    // Avoid picking the same color back-to-back
    let idx;
    do { idx = (Math.random() * PALETTE.length) | 0; } while (idx === lastColorIdx);
    lastColorIdx = idx;
    return idx;
}

function spawnWipe(opts = {}) {
    const colorIdx  = opts.colorIdx  != null ? opts.colorIdx  : chooseColorIdx();
    const direction = opts.direction != null ? opts.direction : (Math.random() * 8) | 0;

    let region;
    if (opts.region) {
        region = opts.region;
    } else {
        const roll = Math.random();
        if (roll < 0.35) {
            // Full canvas
            region = { x: 0, y: 0, w: W, h: H };
        } else if (roll < 0.70) {
            // Half / band
            const r = Math.random();
            if (r < 0.25) region = { x: 0, y: 0, w: W, h: (H / 2) | 0 };
            else if (r < 0.5) region = { x: 0, y: H - ((H / 2) | 0), w: W, h: (H / 2) | 0 };
            else if (r < 0.75) region = { x: 0, y: 0, w: (W / 2) | 0, h: H };
            else region = { x: W - ((W / 2) | 0), y: 0, w: (W / 2) | 0, h: H };
        } else {
            // Smaller block
            const sw = ((0.22 + Math.random() * 0.45) * W) | 0;
            const sh = ((0.22 + Math.random() * 0.45) * H) | 0;
            region = {
                x: (Math.random() * (W - sw)) | 0,
                y: (Math.random() * (H - sh)) | 0,
                w: sw,
                h: sh,
            };
        }
    }

    activeWipes.push({
        colorIdx,
        direction,
        region,
        progress: 0,
        // Slower than before — wipes feel composed, not frantic
        speed: opts.speed != null ? opts.speed : 0.0022 + Math.random() * 0.008,
    });
}

function sweepWipe(wipe, oldP, newP) {
    const r = wipe.region;
    const c = PALETTE[wipe.colorIdx];
    const dir = wipe.direction;
    const rw = r.w, rh = r.h;
    for (let py = 0; py < rh; py++) {
        const y = r.y + py;
        for (let px = 0; px < rw; px++) {
            const phase = getPhase(dir, px, py, rw, rh);
            if (phase > oldP && phase <= newP) {
                const x = r.x + px;
                const idx = (y * W + x) * 4;
                data[idx]     = c[0];
                data[idx + 1] = c[1];
                data[idx + 2] = c[2];
                data[idx + 3] = 255;
            }
        }
    }
}

// ─── SUBTLE GLITCH LAYER ───────────────────────────────────────────────────
// Three small effects that run continuously on top of the wipe layer:
//   pixelSwap   — N pairs of nearby pixels swap each frame (constant
//                 micro-mixing; sharp boundaries shimmer)
//   rowShift    — rare: a 1–2px row is translated horizontally with wrap
//                 (the data-mosh tear)
//   colDrift    — occasional: a 1–2px column slides up or down by 1px,
//                 wrapping around (the gentle transverse flow)
function pixelSwap(count) {
    for (let i = 0; i < count; i++) {
        const x = (Math.random() * W) | 0;
        const y = (Math.random() * H) | 0;
        const dx = ((Math.random() * 5) | 0) - 2;   // -2..+2
        const dy = ((Math.random() * 5) | 0) - 2;
        const nx = x + dx, ny = y + dy;
        if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
        const i1 = (y  * W + x ) * 4;
        const i2 = (ny * W + nx) * 4;
        const r = data[i1], g = data[i1 + 1], b = data[i1 + 2];
        data[i1]     = data[i2];
        data[i1 + 1] = data[i2 + 1];
        data[i1 + 2] = data[i2 + 2];
        data[i2]     = r;
        data[i2 + 1] = g;
        data[i2 + 2] = b;
    }
}

const _rowBuf = new Uint8ClampedArray(W * 3);
function rowShift() {
    const stripH = 1 + ((Math.random() * 2) | 0);
    const y0 = (Math.random() * (H - stripH)) | 0;
    const shift = 3 + ((Math.random() * 10) | 0);
    const sign = Math.random() < 0.5 ? 1 : -1;
    for (let y = y0; y < y0 + stripH; y++) {
        for (let x = 0; x < W; x++) {
            const i = (y * W + x) * 4;
            _rowBuf[x * 3]     = data[i];
            _rowBuf[x * 3 + 1] = data[i + 1];
            _rowBuf[x * 3 + 2] = data[i + 2];
        }
        for (let x = 0; x < W; x++) {
            const srcX = ((x - sign * shift) % W + W) % W;
            const i = (y * W + x) * 4;
            data[i]     = _rowBuf[srcX * 3];
            data[i + 1] = _rowBuf[srcX * 3 + 1];
            data[i + 2] = _rowBuf[srcX * 3 + 2];
        }
    }
}

function colDrift() {
    const colW = 1 + ((Math.random() * 2) | 0);
    const x0 = (Math.random() * (W - colW)) | 0;
    const dir = Math.random() < 0.5 ? 1 : -1;  // 1 = down, -1 = up
    for (let x = x0; x < x0 + colW; x++) {
        if (dir > 0) {
            // shift down by 1, wrap last to first
            const lastI = ((H - 1) * W + x) * 4;
            const r = data[lastI], g = data[lastI + 1], b = data[lastI + 2];
            for (let y = H - 1; y > 0; y--) {
                const dst = (y * W + x) * 4;
                const src = ((y - 1) * W + x) * 4;
                data[dst]     = data[src];
                data[dst + 1] = data[src + 1];
                data[dst + 2] = data[src + 2];
            }
            const firstI = x * 4;
            data[firstI]     = r;
            data[firstI + 1] = g;
            data[firstI + 2] = b;
        } else {
            const firstI = x * 4;
            const r = data[firstI], g = data[firstI + 1], b = data[firstI + 2];
            for (let y = 0; y < H - 1; y++) {
                const dst = (y * W + x) * 4;
                const src = ((y + 1) * W + x) * 4;
                data[dst]     = data[src];
                data[dst + 1] = data[src + 1];
                data[dst + 2] = data[src + 2];
            }
            const lastI = ((H - 1) * W + x) * 4;
            data[lastI]     = r;
            data[lastI + 1] = g;
            data[lastI + 2] = b;
        }
    }
}

// ─── UPDATE & RENDER ───────────────────────────────────────────────────────
function update() {
    for (let i = activeWipes.length - 1; i >= 0; i--) {
        const w = activeWipes[i];
        const oldP = w.progress;
        const newP = Math.min(1, w.progress + w.speed);
        sweepWipe(w, oldP, newP);
        w.progress = newP;
        if (newP >= 1) activeWipes.splice(i, 1);
    }
    // One wipe almost always in flight, sometimes two — composed, not frantic
    while (activeWipes.length < 1) spawnWipe();
    if (activeWipes.length < 2 && Math.random() < 0.010) spawnWipe();

    // Subtle glitch layer — runs every frame
    pixelSwap(6);                              // constant micro-mixing
    if (Math.random() < 0.014) rowShift();     // rare data-mosh tear
    if (Math.random() < 0.030) colDrift();     // gentle transverse flow
}

function render() {
    update();
    bctx.putImageData(imgData, 0, 0);
    dctx.drawImage(buffer, 0, 0, display.width, display.height);
    requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ─── TAP → spawn a wipe centered on the touch ──────────────────────────────
window.addEventListener('pointerdown', e => {
    if (e.target.closest('.back')) return;
    const rect = display.getBoundingClientRect();
    const cx = ((e.clientX - rect.left) / rect.width) * W;
    const cy = ((e.clientY - rect.top)  / rect.height) * H;
    const sw = ((0.30 + Math.random() * 0.40) * W) | 0;
    const sh = ((0.30 + Math.random() * 0.40) * H) | 0;
    const region = {
        x: Math.max(0, Math.min(W - sw, (cx - sw / 2) | 0)),
        y: Math.max(0, Math.min(H - sh, (cy - sh / 2) | 0)),
        w: sw, h: sh,
    };
    spawnWipe({ region, speed: 0.022 + Math.random() * 0.018 });
});

// Prevent iOS double-tap zoom
let _lastTouchEnd = 0;
document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - _lastTouchEnd < 350) e.preventDefault();
    _lastTouchEnd = now;
}, { passive: false });
</script>

</body>
</html>
