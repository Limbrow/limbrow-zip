<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blocks · preview</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: #000;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
    }
    #stage {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }
</style>
</head>
<body>

<canvas id="stage"></canvas>

<script>
// ════════════════════════════════════════════════════════════════════════════
// BLOCKS PREVIEW — same advection engine as the live post at lower
// resolution. Auto-reseeds every 18 s so the card cycles through systems
// while sitting in the home grid, but each piece has time to develop.
// ════════════════════════════════════════════════════════════════════════════

const display = document.getElementById('stage');
const dctx = display.getContext('2d');

const W = 180;
const H = Math.max(80, Math.floor(W * (window.innerHeight / window.innerWidth))) || W;

const buffer = document.createElement('canvas');
buffer.width = W;
buffer.height = H;
const bctx = buffer.getContext('2d');
const imgData = bctx.createImageData(W, H);
const data8  = imgData.data;
const data32 = new Uint32Array(data8.buffer);
const buf2   = new Uint32Array(W * H);

function fitDisplay() {
    display.width = window.innerWidth;
    display.height = window.innerHeight;
    dctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fitDisplay);
fitDisplay();

function hslToRgb(h, s, l) {
    const c = (1 - Math.abs(2 * l - 1)) * s;
    const hp = h / 60;
    const x = c * (1 - Math.abs(hp % 2 - 1));
    let r, g, b;
    if (hp < 1)      { r = c; g = x; b = 0; }
    else if (hp < 2) { r = x; g = c; b = 0; }
    else if (hp < 3) { r = 0; g = c; b = x; }
    else if (hp < 4) { r = 0; g = x; b = c; }
    else if (hp < 5) { r = x; g = 0; b = c; }
    else             { r = c; g = 0; b = x; }
    const m = l - c / 2;
    return [
        Math.round((r + m) * 255),
        Math.round((g + m) * 255),
        Math.round((b + m) * 255),
    ];
}
const pack = c => (255 << 24) | (c[2] << 16) | (c[1] << 8) | c[0];

const COLOR_SYSTEMS = ['monochrome', 'triadic', 'analogous', 'greyscale', 'random'];
const LAYOUTS = ['grid', 'rows', 'cols', 'checker', 'scatter', 'nested', 'spectrum', 'bars'];
const LAYOUT_WEIGHTS = [17, 16, 16, 15, 14, 13, 5, 4];
function pickLayout() {
    let total = 0; for (const w of LAYOUT_WEIGHTS) total += w;
    let r = Math.random() * total;
    for (let i = 0; i < LAYOUTS.length; i++) {
        r -= LAYOUT_WEIGHTS[i];
        if (r <= 0) return LAYOUTS[i];
    }
    return LAYOUTS[0];
}
function lerpRGBPacked(c1, c2, t) {
    const r1 = c1 & 0xFF, g1 = (c1 >> 8) & 0xFF, b1 = (c1 >> 16) & 0xFF;
    const r2 = c2 & 0xFF, g2 = (c2 >> 8) & 0xFF, b2 = (c2 >> 16) & 0xFF;
    const r = (r1 + (r2 - r1) * t) | 0;
    const g = (g1 + (g2 - g1) * t) | 0;
    const b = (b1 + (b2 - b1) * t) | 0;
    return (255 << 24) | (b << 16) | (g << 8) | r;
}

function generatePalette() {
    const sys = COLOR_SYSTEMS[(Math.random() * COLOR_SYSTEMS.length) | 0];
    const baseHue = Math.random() * 360;
    const count = 5 + ((Math.random() * 5) | 0);
    let palette;
    if (sys === 'monochrome') {
        const sat = 0.45 + Math.random() * 0.35;
        palette = Array.from({ length: count }, (_, i) =>
            hslToRgb(baseHue, sat, 0.08 + (i / (count - 1)) * 0.84));
    } else if (sys === 'triadic') {
        const hues = [baseHue, (baseHue + 120) % 360, (baseHue + 240) % 360];
        palette = [];
        for (let i = 0; i < count; i++) {
            const h = hues[i % 3];
            const low = (i % 6) < 3;
            palette.push(hslToRgb(h, low ? 0.78 : 0.65, low ? 0.28 : 0.66));
        }
    } else if (sys === 'analogous') {
        const span = 60 + Math.random() * 70;
        palette = Array.from({ length: count }, (_, i) =>
            hslToRgb((baseHue + (i / Math.max(1, count - 1)) * span) % 360,
                     0.68, 0.28 + (i / Math.max(1, count - 1)) * 0.42));
    } else if (sys === 'greyscale') {
        palette = Array.from({ length: count }, (_, i) => {
            const v = Math.round((i / (count - 1)) * 235 + 10); return [v, v, v];
        });
    } else {
        palette = Array.from({ length: count }, () =>
            hslToRgb(Math.random() * 360, 0.5 + Math.random() * 0.4, 0.22 + Math.random() * 0.46));
    }
    return palette;
}

function initState(layout, packed, seed) {
    const len = packed.length;
    if (layout === 'grid') {
        const bs = 3 + ((seed % 9) + 1);
        for (let y = 0; y < H; y++) {
            const by = (y / bs) | 0;
            for (let x = 0; x < W; x++) {
                const bx = (x / bs) | 0;
                const h = ((bx * 2654435761) ^ (by * 2246822519) ^ seed) >>> 0;
                data32[y * W + x] = packed[h % len];
            }
        }
    } else if (layout === 'rows') {
        const rh = 3 + ((seed % 11) + 1);
        for (let y = 0; y < H; y++) {
            const ry = (y / rh) | 0;
            const h = ((ry * 2654435761) ^ seed) >>> 0;
            const c = packed[h % len];
            for (let x = 0; x < W; x++) data32[y * W + x] = c;
        }
    } else if (layout === 'cols') {
        const cw = 3 + ((seed % 11) + 1);
        for (let x = 0; x < W; x++) {
            const cx = (x / cw) | 0;
            const h = ((cx * 2654435761) ^ seed) >>> 0;
            const c = packed[h % len];
            for (let y = 0; y < H; y++) data32[y * W + x] = c;
        }
    } else if (layout === 'checker') {
        const bs = 4 + ((seed % 8) + 1);
        for (let y = 0; y < H; y++) {
            const by = (y / bs) | 0;
            for (let x = 0; x < W; x++) {
                const bx = (x / bs) | 0;
                data32[y * W + x] = packed[(bx + by) % len];
            }
        }
    } else if (layout === 'scatter') {
        const bs = 2 + ((seed % 4) + 1);
        for (let y = 0; y < H; y++) {
            const by = (y / bs) | 0;
            for (let x = 0; x < W; x++) {
                const bx = (x / bs) | 0;
                const h = ((bx * 374761393) ^ (by * 668265263) ^ seed) >>> 0;
                data32[y * W + x] = packed[h % len];
            }
        }
    } else if (layout === 'nested') {
        const cx = W * 0.5, cy = H * 0.5;
        const ring = 4 + ((seed % 10) + 1);
        for (let y = 0; y < H; y++) {
            const dy = Math.abs(y - cy);
            for (let x = 0; x < W; x++) {
                const dx = Math.abs(x - cx);
                const d = dx > dy ? dx : dy;
                const ri = (d / ring) | 0;
                const h = ((ri * 2654435761) ^ seed) >>> 0;
                data32[y * W + x] = packed[h % len];
            }
        }
    } else if (layout === 'spectrum') {
        for (let x = 0; x < W; x++) {
            const t = x / (W - 1);
            const idx = t * (len - 1);
            const i0 = idx | 0;
            const i1 = i0 + 1 < len ? i0 + 1 : len - 1;
            const f = idx - i0;
            const c = lerpRGBPacked(packed[i0], packed[i1], f);
            for (let y = 0; y < H; y++) data32[y * W + x] = c;
        }
    } else {
        const stripeW = 2 + (seed & 1);
        for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
                const stripe = (x / stripeW) | 0;
                data32[y * W + x] = packed[stripe % len];
            }
        }
    }
}

const FLOWS = {
    laminar: {
        threshold: 0.48, speed: 0.00016,
        velocity(nx, ny, t, ph) {
            return { vx: Math.sin(nx * 1.2 + t * 0.7 + ph) + Math.cos(ny * 0.9 - t * 0.6) * 0.5,
                     vy: Math.cos(ny * 1.2 + t * 0.8 + ph * 0.6) + Math.sin(nx * 0.9 + t * 0.5) * 0.5 };
        },
    },
    swirl: {
        threshold: 0.40, speed: 0.00018,
        velocity(nx, ny, t, ph) {
            const r = Math.sqrt(nx * nx + ny * ny);
            const a = Math.atan2(ny, nx) + t * 0.45 + ph;
            const m = 1 + Math.sin(r * 2.6 - t * 0.9) * 0.6;
            return { vx: -Math.sin(a) * m, vy: Math.cos(a) * m };
        },
    },
    shear: {
        threshold: 0.35, speed: 0.00020,
        velocity(nx, ny, t, ph) {
            return { vx: Math.sin(ny * 3.2 + t * 1.0 + ph) * 1.5,
                     vy: Math.cos(nx * 0.6 + t * 0.35) * 0.55 + Math.sin(ny * 1.1 + t * 0.4) * 0.30 };
        },
    },
    turbulent: {
        threshold: 0.32, speed: 0.00022,
        velocity(nx, ny, t, ph) {
            return { vx: Math.sin(nx * 1.4 + t * 0.9 + ph) + Math.cos(ny * 2.2 - t * 1.3) * 0.7 + Math.sin(nx * 3.5 + ny * 0.8 + t * 2.0) * 0.55,
                     vy: Math.cos(ny * 1.4 + t * 1.0 + ph * 0.7) + Math.sin(nx * 2.2 + t * 0.85) * 0.7 + Math.cos(ny * 3.5 + nx * 0.6 + t * 1.8) * 0.55 };
        },
    },
    axial: {
        threshold: 0.55, speed: 0.00014,
        velocity(nx, ny, t, ph) {
            return { vx: Math.sin(nx * 0.8 + ny * 0.6 + t * 0.6 + ph) * 1.8 + Math.sin(nx * 2.5 + t * 0.4) * 0.3,
                     vy: Math.cos(ny * 0.8 - nx * 0.6 + t * 0.7) * 1.8 + Math.cos(ny * 2.5 + t * 0.45) * 0.3 };
        },
    },
};
const FLOW_NAMES = Object.keys(FLOWS);

let packed   = [];
let layout   = 'grid';
let flowName = 'laminar';
let flowDef  = FLOWS.laminar;
let attractors = [];
let seed     = 0;
let phase    = 0;
let patience = 0.6;

function reseed() {
    packed   = generatePalette().map(pack);
    layout   = pickLayout();
    flowName = FLOW_NAMES[(Math.random() * FLOW_NAMES.length) | 0];
    flowDef  = FLOWS[flowName];
    seed     = (Math.random() * 2147483647) | 0;
    phase    = ((seed & 0xFFFF) / 0xFFFF) * Math.PI * 2;
    patience = 0.45 + Math.random() * 0.55;

    const attCount = (Math.random() * 4) | 0;
    attractors = [];
    for (let i = 0; i < attCount; i++) {
        attractors.push({
            x: (Math.random() * 2 - 1) * 1.2,
            y: (Math.random() * 2 - 1) * 1.2,
            strength: (Math.random() * 1.4 + 0.6) * (Math.random() < 0.5 ? 1 : -1),
            range: 0.6 + Math.random() * 1.4,
        });
    }

    initState(layout, packed, seed);
}
reseed();

const FW = 48;
const FH = Math.max(18, Math.floor(FW * H / W));
const flowDX = new Int8Array(FW * FH);
const flowDY = new Int8Array(FW * FH);

function updateFlow(time) {
    const t = time * flowDef.speed;
    const tt = time;
    const breath = 0.5 + Math.sin(tt * 0.00009 + phase) * 0.5;
    const beatA  = Math.max(0, Math.sin(tt * 0.00072 + phase * 1.3) - 0.84) * 5;
    const beatB  = Math.max(0, Math.sin(tt * 0.00115 + phase * 1.9) - 0.88) * 5;
    const beats  = beatA > beatB ? beatA : beatB;
    const baseThresh = flowDef.threshold * (0.8 + patience * 0.8);
    const thresh = baseThresh * (1.30 - breath * 0.45 - beats * 0.55);
    const half = thresh * 0.45;
    const vel = flowDef.velocity;
    for (let fy = 0; fy < FH; fy++) {
        const ny = fy / FH * 3.0 - 1.5;
        for (let fx = 0; fx < FW; fx++) {
            const nx = fx / FW * 3.0 - 1.5;
            const v = vel(nx, ny, t, phase);
            let vx = v.vx, vy = v.vy;
            for (let i = 0; i < attractors.length; i++) {
                const a = attractors[i];
                const dx = a.x - nx, dy = a.y - ny;
                const r = Math.sqrt(dx * dx + dy * dy) + 0.05;
                if (r < a.range) {
                    const fo = 1 - r / a.range;
                    vx += (dx / r) * a.strength * fo;
                    vy += (dy / r) * a.strength * fo;
                }
            }
            const ax = vx < 0 ? -vx : vx;
            const ay = vy < 0 ? -vy : vy;
            flowDX[fy * FW + fx] = ax > half ? (vx > 0 ? 1 : -1) : 0;
            flowDY[fy * FW + fx] = ay > half ? (vy > 0 ? 1 : -1) : 0;
        }
    }
}

function step() {
    const fxScale = FW / W, fyScale = FH / H;
    for (let y = 0; y < H; y++) {
        const fy = (y * fyScale) | 0;
        const fyBase = fy * FW;
        const yBase = y * W;
        for (let x = 0; x < W; x++) {
            const fx = (x * fxScale) | 0;
            const dx = flowDX[fyBase + fx];
            const dy = flowDY[fyBase + fx];
            let sx = x - dx, sy = y - dy;
            if (sx < 0) sx += W; else if (sx >= W) sx -= W;
            if (sy < 0) sy += H; else if (sy >= H) sy -= H;
            buf2[yBase + x] = data32[sy * W + sx];
        }
    }
    data32.set(buf2);
}

const RESEED_MS = 18000;
let lastReseed = performance.now();
const t0 = performance.now();

function loop() {
    const now = performance.now();
    const t = now - t0;
    if (now - lastReseed > RESEED_MS) {
        reseed();
        lastReseed = now;
    }
    updateFlow(t);
    step();
    bctx.putImageData(imgData, 0, 0);
    dctx.drawImage(buffer, 0, 0, display.width, display.height);
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

</body>
</html>
