<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blocks · preview</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: #000;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
    }
    #stage {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }
</style>
</head>
<body>

<canvas id="stage"></canvas>

<script>
// ════════════════════════════════════════════════════════════════════════════
// BLOCKS PREVIEW — same flow-field advection engine at lower res.
// Auto-reseeds every ~7s so the card cycles through colour systems.
// ════════════════════════════════════════════════════════════════════════════

const display = document.getElementById('stage');
const dctx = display.getContext('2d');

const W = 180;
const H = Math.max(80, Math.floor(W * (window.innerHeight / window.innerWidth))) || W;

const buffer = document.createElement('canvas');
buffer.width = W;
buffer.height = H;
const bctx = buffer.getContext('2d');
const imgData = bctx.createImageData(W, H);
const data8  = imgData.data;
const data32 = new Uint32Array(data8.buffer);
const buf2   = new Uint32Array(W * H);

function fitDisplay() {
    display.width = window.innerWidth;
    display.height = window.innerHeight;
    dctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fitDisplay);
fitDisplay();

function hslToRgb(h, s, l) {
    const c = (1 - Math.abs(2 * l - 1)) * s;
    const hp = h / 60;
    const x = c * (1 - Math.abs(hp % 2 - 1));
    let r, g, b;
    if (hp < 1)      { r = c; g = x; b = 0; }
    else if (hp < 2) { r = x; g = c; b = 0; }
    else if (hp < 3) { r = 0; g = c; b = x; }
    else if (hp < 4) { r = 0; g = x; b = c; }
    else if (hp < 5) { r = x; g = 0; b = c; }
    else             { r = c; g = 0; b = x; }
    const m = l - c / 2;
    return [
        Math.round((r + m) * 255),
        Math.round((g + m) * 255),
        Math.round((b + m) * 255),
    ];
}
function packColor(c) { return (255 << 24) | (c[2] << 16) | (c[1] << 8) | c[0]; }

const COLOR_SYSTEMS = ['monochrome', 'triadic', 'analogous', 'greyscale', 'random'];

function generatePalette() {
    const sys = COLOR_SYSTEMS[Math.floor(Math.random() * COLOR_SYSTEMS.length)];
    const baseHue = Math.random() * 360;
    let palette;
    if (sys === 'monochrome') {
        const sat = 0.45 + Math.random() * 0.35;
        palette = Array.from({ length: 6 }, (_, i) => hslToRgb(baseHue, sat, 0.10 + i * 0.15));
    } else if (sys === 'triadic') {
        const hues = [baseHue, (baseHue + 120) % 360, (baseHue + 240) % 360];
        palette = [];
        for (const h of hues) {
            palette.push(hslToRgb(h, 0.78, 0.28));
            palette.push(hslToRgb(h, 0.65, 0.66));
        }
    } else if (sys === 'analogous') {
        const span = 70 + Math.random() * 50;
        palette = Array.from({ length: 6 }, (_, i) =>
            hslToRgb((baseHue + i * (span / 6)) % 360, 0.7, 0.30 + i * 0.07));
    } else if (sys === 'greyscale') {
        palette = Array.from({ length: 6 }, (_, i) => {
            const v = Math.round((i / 5) * 235 + 10); return [v, v, v];
        });
    } else {
        palette = Array.from({ length: 6 }, () =>
            hslToRgb(Math.random() * 360, 0.55 + Math.random() * 0.35, 0.25 + Math.random() * 0.4));
    }
    return palette;
}

let packed = [];
let layout = 'grid';
let seed = 0;

function reseed() {
    packed = generatePalette().map(packColor);
    layout = Math.random() < 0.55 ? 'grid' : 'rows';
    seed   = (Math.random() * 2147483647) | 0;
    if (layout === 'grid') {
        const blockSize = 3 + Math.floor((seed % 9) + 1);
        for (let y = 0; y < H; y++) {
            const by = (y / blockSize) | 0;
            for (let x = 0; x < W; x++) {
                const bx = (x / blockSize) | 0;
                const h = ((bx * 2654435761) ^ (by * 2246822519) ^ seed) >>> 0;
                data32[y * W + x] = packed[h % packed.length];
            }
        }
    } else {
        const rowH = 3 + Math.floor((seed % 11) + 1);
        for (let y = 0; y < H; y++) {
            const ry = (y / rowH) | 0;
            const h = ((ry * 2654435761) ^ seed) >>> 0;
            const c = packed[h % packed.length];
            for (let x = 0; x < W; x++) data32[y * W + x] = c;
        }
    }
}
reseed();

const FW = 48;
const FH = Math.max(18, Math.floor(FW * H / W));
const flowDX = new Int8Array(FW * FH);
const flowDY = new Int8Array(FW * FH);

function updateFlow(time) {
    const t = time * 0.00018;
    const ph = (seed & 0xFFFF) / 0xFFFF * Math.PI * 2;
    for (let fy = 0; fy < FH; fy++) {
        const ny = fy / FH * 3.5 - 1.75;
        for (let fx = 0; fx < FW; fx++) {
            const nx = fx / FW * 3.5 - 1.75;
            const vx = Math.sin(nx * 1.4 + t * 0.9 + ph) + Math.cos(ny * 0.7 - t * 1.1) * 0.6 + Math.sin(nx * 2.4 + ny * 0.5 + t * 1.7) * 0.3;
            const vy = Math.cos(ny * 1.4 + t * 1.0 + ph * 0.7) + Math.sin(nx * 0.7 + t * 0.85) * 0.6 + Math.cos(ny * 2.4 + nx * 0.5 + t * 1.5) * 0.3;
            const ax = vx < 0 ? -vx : vx;
            const ay = vy < 0 ? -vy : vy;
            const thresh = 0.42;
            flowDX[fy * FW + fx] = ax > thresh ? (vx > 0 ? 1 : -1) : 0;
            flowDY[fy * FW + fx] = ay > thresh ? (vy > 0 ? 1 : -1) : 0;
        }
    }
}

function step() {
    const fxScale = FW / W, fyScale = FH / H;
    for (let y = 0; y < H; y++) {
        const fy = (y * fyScale) | 0;
        const fyBase = fy * FW;
        const yBase = y * W;
        for (let x = 0; x < W; x++) {
            const fx = (x * fxScale) | 0;
            const dx = flowDX[fyBase + fx];
            const dy = flowDY[fyBase + fx];
            let sx = x - dx, sy = y - dy;
            if (sx < 0) sx += W; else if (sx >= W) sx -= W;
            if (sy < 0) sy += H; else if (sy >= H) sy -= H;
            buf2[yBase + x] = data32[sy * W + sx];
        }
    }
    data32.set(buf2);
}

const RESEED_MS = 7000;
let lastReseed = performance.now();
const t0 = performance.now();

function loop() {
    const now = performance.now();
    const t = now - t0;
    if (now - lastReseed > RESEED_MS) {
        reseed();
        lastReseed = now;
    }
    updateFlow(t);
    step();
    bctx.putImageData(imgData, 0, 0);
    dctx.drawImage(buffer, 0, 0, display.width, display.height);
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

</body>
</html>
