<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>aviary · limbrow.zip</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        background: #04050a;
        color: #e8e8e8;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    /* ─── BACK ─── */
    .back {
        position: fixed;
        top: 16px; left: 16px;
        z-index: 100;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(10, 14, 30, 0.65);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 50%;
        color: #fff;
        text-decoration: none;
        font-size: 16px;
        line-height: 1;
        padding-bottom: 2px;
    }

    /* ─── CANVASES ─── */
    #sky, #birds {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: block;
    }
    #sky   { z-index: 1; }
    #birds { z-index: 2; touch-action: none; }

    /* ─── HINT (centered, fades after first tap) ─── */
    .hint {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
        font-size: 11px;
        letter-spacing: 0.3em;
        color: rgba(255,255,255,0.55);
        mix-blend-mode: screen;
        pointer-events: none;
        text-transform: uppercase;
        text-align: center;
        transition: opacity 0.6s ease;
    }
    .hint.gone { opacity: 0; }

    /* ─── HUD READOUT (top right) ─── */
    .hud {
        position: fixed;
        top: 16px; right: 16px;
        z-index: 50;
        font-size: 9px;
        letter-spacing: 0.1em;
        line-height: 1.5;
        color: rgba(220, 200, 255, 0.7);
        text-align: right;
        mix-blend-mode: screen;
        pointer-events: none;
    }
    .hud .k { color: rgba(180, 160, 220, 0.5); display: inline-block; width: 60px; text-align: right; }

    /* ─── PANEL (floating bottom, minimizable) ─── */
    .panel {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        width: min(560px, calc(100vw - 32px));
        background: rgba(8, 10, 22, 0.65);
        backdrop-filter: blur(20px) saturate(140%);
        -webkit-backdrop-filter: blur(20px) saturate(140%);
        border: 1px solid rgba(180, 160, 230, 0.15);
        border-radius: 14px;
        padding: 14px;
        box-shadow:
            0 20px 60px rgba(0,0,0,0.5),
            0 0 0 1px rgba(255,255,255,0.04) inset;
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.28s ease,
                    border-radius 0.32s ease;
    }
    .panel.minimized {
        transform: translateX(-50%) translateY(calc(100% - 38px));
        border-radius: 18px 18px 0 0;
    }

    .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 12px;
        margin-bottom: 12px;
        border-bottom: 1px solid rgba(180, 160, 230, 0.08);
        cursor: pointer;
    }
    .panel.minimized .panel-head {
        padding-bottom: 0;
        margin-bottom: 0;
        border-bottom: none;
    }

    .panel-title {
        font-size: 9px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: rgba(220, 200, 255, 0.7);
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .panel-title::before {
        content: '';
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #c8a4ff;
        box-shadow: 0 0 6px rgba(200, 164, 255, 0.8);
    }

    .panel-toggle-btn {
        background: none; border: 0;
        color: rgba(220, 200, 255, 0.6);
        font-size: 14px;
        cursor: pointer;
        padding: 4px 8px;
        margin: -4px -8px;
        font-family: inherit;
        transition: color 0.15s, transform 0.32s;
    }
    .panel-toggle-btn:hover { color: rgba(220, 200, 255, 1); }
    .panel.minimized .panel-toggle-btn { transform: rotate(180deg); }

    .panel-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        transition: opacity 0.2s, max-height 0.32s ease;
        max-height: 500px;
        overflow: hidden;
    }
    .panel.minimized .panel-body {
        opacity: 0;
        max-height: 0;
        pointer-events: none;
    }

    .col { display: flex; flex-direction: column; gap: 10px; }

    h3 {
        font-size: 8px;
        font-weight: 500;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(180, 170, 220, 0.5);
        margin-bottom: 2px;
    }

    /* Segmented control */
    .seg {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        padding: 3px;
        gap: 0;
    }
    .seg button {
        background: transparent;
        border: 0;
        color: rgba(220, 200, 255, 0.55);
        padding: 7px 4px;
        font-family: inherit;
        font-size: 9px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-weight: 500;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.15s;
    }
    .seg button:hover { color: rgba(255, 255, 255, 0.85); }
    .seg button.active {
        background: rgba(200, 164, 255, 0.18);
        color: #fff;
        box-shadow:
            0 0 12px rgba(180, 100, 255, 0.25) inset,
            0 1px 0 rgba(255, 255, 255, 0.05);
    }

    label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 8px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(180, 170, 220, 0.5);
        margin-bottom: 4px;
    }
    label .val {
        color: rgba(220, 200, 255, 0.95);
        letter-spacing: 0;
        font-size: 10px;
    }

    input[type=range] {
        width: 100%;
        -webkit-appearance: none;
        appearance: none;
        height: 2px;
        background: rgba(180, 160, 230, 0.12);
        outline: none;
        border-radius: 1px;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px; height: 14px;
        background: radial-gradient(circle at 30% 30%, #e0c8ff 0%, #8060e0 100%);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 12px rgba(180, 100, 255, 0.6);
        border: 0;
    }
    input[type=range]::-moz-range-thumb {
        width: 14px; height: 14px;
        background: #c8a4ff;
        border-radius: 50%;
        cursor: pointer;
        border: 0;
        box-shadow: 0 0 12px rgba(180, 100, 255, 0.6);
    }

    /* iOS-style toggle */
    .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .toggle {
        position: relative;
        width: 36px; height: 20px;
        background: rgba(180, 160, 230, 0.15);
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
    }
    .toggle::after {
        content: '';
        position: absolute;
        top: 2px; left: 2px;
        width: 16px; height: 16px;
        border-radius: 50%;
        background: rgba(220, 200, 255, 0.8);
        transition: transform 0.2s, background 0.2s;
    }
    .toggle.on {
        background: rgba(200, 164, 255, 0.35);
    }
    .toggle.on::after {
        transform: translateX(16px);
        background: #fff;
        box-shadow: 0 0 8px rgba(200, 164, 255, 0.6);
    }

    @media (max-width: 480px) {
        .panel { padding: 12px; }
        .panel-body { grid-template-columns: 1fr; gap: 14px; }
    }
</style>

<script>
// ════════════════════════════════════════════════════════════════════════════
// AVIARY — tap the sky to release a bird; it flies and sings.
//
// Architecture:
//   - SKY: time-of-day gradient + procedural clouds (DAWN/DAY/DUSK) or stars
//          (NIGHT). Palette transitions smoothly when the mode changes.
//   - BIRDS: tap to spawn at that point. Each bird picks a species from the
//            current mode's pool and renders as a small flapping silhouette
//            following a soft arc. Sings while alive, then drifts off-screen.
//   - AUDIO: Tone.js synth voices per species — no samples. Each species
//            schedules a phrase of pitch-swept chirps with its own timbre.
//   - PITCH slider transposes every voice.
//   - AMBIENT CHORUS toggle auto-spawns birds at random sky points; density
//            slider controls the rate.
// ════════════════════════════════════════════════════════════════════════════

const skyCanvas = document.getElementById('sky');
const birdsCanvas = document.getElementById('birds');
const skyCtx = skyCanvas.getContext('2d');
const birdCtx = birdsCanvas.getContext('2d');

// ─── STATE ──────────────────────────────────────────────────────────────────
const state = {
    started: false,
    mode: 'day',
    pitch: 1.0,            // 0.5 .. 2.0 transpose factor
    chorus: false,
    density: 0.5,          // 0..1 → spawn rate for ambient chorus
    t: 0,
    birds: [],
    nextChorusAt: 0,
    paletteT: 0,           // mode-crossfade progress 0..1
    palettePrev: null,
    paletteCurr: null,
};

// ─── CANVAS RESIZE ──────────────────────────────────────────────────────────
function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    [skyCanvas, birdsCanvas].forEach(c => {
        const r = c.getBoundingClientRect();
        c.width = Math.floor(r.width * dpr);
        c.height = Math.floor(r.height * dpr);
        c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    });
}
window.addEventListener('resize', resize);
resize();

// ─── PALETTES (per mode) ────────────────────────────────────────────────────
// Each palette = sky gradient stops (top→bottom) + cloud tint + cloud opacity
// + "stars" flag.
const PALETTES = {

        stars: false,
        moon: false,
    },
    day: {
        sky:  [[0,'#5db5e8'], [0.6,'#b5dff5'], [1.0,'#dfeef5']],
        cloud: [255, 255, 255],
        cloudOpacity: 0.55,
        stars: false,
        moon: false,
    },
    dusk: {
        sky:  [[0,'#1a1442'], [0.4,'#7d3b6b'], [0.75,'#e85a3e'], [1.0,'#f4a14b']],
        cloud: [255, 170, 130],
        cloudOpacity: 0.32,
        stars: false,
        moon: false,

    night: {

// ─── SPECIES (per mode) ─────────────────────────────────────────────────────
// Each species:
//   name       — display name (HUD)
//   silhouette — drawing function (cx, cy, dir, size, color, wingPhase)
//   size       — drawn scale
//   color      — fill color
//   speed      — horizontal speed multiplier
//   wingRate   — flap speed multiplier
//   lifetime   — ms before bird exits naturally
//   sing(voice, baseFreq, when) — schedule a phrase on the voice (returns total dur)
//
// Songs are encoded as arrays of "chirps":
//   { f1, f2, dur, gap, type, vol }
//     f1/f2 — start/end frequency for the pitch slide (in absolute Hz, before transpose)
//     dur   — chirp duration (s)
//     gap   — silence after this chirp (s)
//     type  — 'sine' | 'triangle' | 'square' (default sine)
//     vol   — 0..1 multiplier (default 0.4)
//
// A few species use longer, more melodic phrases; others are short staccato.

const SPECIES = {

            { f1: 3500, f2: 4200, dur: 0.07, gap: 0.05 },
            { f1: 3100, f2: 3700, dur: 0.06, gap: 0.30 },

            // Long mechanical churr — 30 rapid pulses

        phrase: (() => {

        })(),

};

const MODE_SPECIES = {
    dawn:  ['blackbird', 'robin'],
    day:   ['sparrow', 'goldfinch', 'swallow'],
    dusk:  ['nightingale', 'woodpigeon'],
    night: ['owl', 'nightjar', 'cricket'],
};

// ─── AUDIO ──────────────────────────────────────────────────────────────────
let masterGain, reverb;

async function initAudio() {
    await Tone.start();
    masterGain = new Tone.Gain(0.6).toDestination();
    reverb = new Tone.Reverb({ decay: 4.5, wet: 0.35, preDelay: 0.03 });
    await reverb.generate();
    reverb.connect(masterGain);
}

// Schedule one bird's phrase on a fresh voice. Disposes itself when done.
function playPhrase(species) {
    if (!masterGain) return;
    const t0 = Tone.now() + 0.02;
    const phrase = species.phrase;

    // Per-voice setup: oscillator → env → filter → reverb bus
    const osc = new Tone.Oscillator({ frequency: phrase[0].f1, type: phrase[0].type || 'sine' });
    const env = new Tone.AmplitudeEnvelope({ attack: 0.005, decay: 0.04, sustain: 0.7, release: 0.04 });
    const filt = new Tone.Filter({ frequency: 6000, type: 'lowpass', Q: 1 });
    osc.connect(env);
    env.connect(filt);
    filt.connect(reverb);
    osc.start(t0);

    let cursor = 0;
    let totalDur = 0;
    for (const c of phrase) {
        const f1 = c.f1 * state.pitch;
        const f2 = c.f2 * state.pitch;
        const start = t0 + cursor;
        osc.frequency.setValueAtTime(f1, start);
        osc.frequency.linearRampToValueAtTime(f2, start + c.dur);
        if (c.type) osc.type = c.type;
        const v = c.vol != null ? c.vol : 0.4;
        if (v > 0) {
            env.triggerAttackRelease(c.dur, start, v);
        }
        cursor += c.dur + c.gap;
        totalDur = cursor;
    }
    // Stop & dispose
    const stopAt = t0 + totalDur + 0.5;
    osc.stop(stopAt);
    setTimeout(() => {
        try { osc.dispose(); env.dispose(); filt.dispose(); } catch(e) {}
    }, (stopAt - Tone.now() + 0.3) * 1000);
    return totalDur;
}

// ─── BIRDS ──────────────────────────────────────────────────────────────────
class Bird {
    constructor(speciesKey, x, y, dir) {
        this.speciesKey = speciesKey;
        this.species = SPECIES[speciesKey];
        this.x = x;
        this.y = y;
        // Choose direction so the bird flies AWAY (off-screen) eventually
        const baseDir = dir != null ? dir : (Math.random() < 0.5 ? -1 : 1);
        this.vx = baseDir * (28 + Math.random() * 14) * this.species.speed; // px/s
        this.vy = -8 - Math.random() * 12;                                   // gently rising
        this.dir = baseDir;
        this.wing = Math.random() * Math.PI * 2;
        this.age = 0;
        this.lifetime = this.species.lifetime + Math.random() * 1500;
        this.fadeIn = 280;       // ms to fade in
        // Schedule the song
        this.songDur = (playPhrase(this.species) || 1) * 1000;
        this.songEnd = this.age + this.songDur;
    }

    update(dt) {
        this.age += dt;
        // Wing flap
        this.wing += dt * 0.012 * this.species.wingRate;
        // Path: soft sinusoidal up-down bob + slight gravity at end of life
        const bob = Math.sin(this.age * 0.005) * 6;
        this.x += (this.vx * dt) / 1000;
        this.y += ((this.vy + bob * 0.05) * dt) / 1000;
        // After song ends, accelerate exit
        if (this.age > this.songEnd) {
            this.vx += (this.dir > 0 ? 1 : -1) * dt * 0.05;
            this.vy -= dt * 0.005;
        }
    }

    isDead(w, h) {
        return this.age > this.lifetime ||
               this.x < -60 || this.x > w + 60 ||
               this.y < -80 || this.y > h + 60;
    }

    draw(ctx) {
        const w = this.species.size * 14;
        const wingY = Math.sin(this.wing) * 0.55 + 0.45; // 0..1, controls wing angle
        const fade = Math.min(1, this.age / this.fadeIn);
        const remain = Math.max(0, 1 - Math.max(0, this.age - (this.lifetime - 400)) / 400);
        const alpha = fade * remain;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(this.x, this.y);
        ctx.scale(this.dir, 1);
        ctx.fillStyle = this.species.color;

        // Simple "M" silhouette — left wing | body | right wing
        // body
        ctx.beginPath();
        ctx.ellipse(0, 0, w * 0.18, w * 0.10, 0, 0, Math.PI * 2);
        ctx.fill();
        // wings as two curves meeting at the body
        const wingLift = w * (0.10 + wingY * 0.55);
        const wingSpan = w;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-wingSpan * 0.35, -wingLift, -wingSpan, -wingLift * 0.30);
        ctx.quadraticCurveTo(-wingSpan * 0.5, wingLift * 0.05, 0, w * 0.05);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(wingSpan * 0.35, -wingLift, wingSpan, -wingLift * 0.30);
        ctx.quadraticCurveTo(wingSpan * 0.5, wingLift * 0.05, 0, w * 0.05);
        ctx.fill();

        ctx.restore();
    }
}

function spawnBird(x, y) {
    if (!state.started) return;
    const pool = MODE_SPECIES[state.mode];
    const speciesKey = pool[Math.floor(Math.random() * pool.length)];
    // Direction picked so the bird tends to fly toward more sky (away from edge it spawned near)
    const w = birdsCanvas.clientWidth;
    let dir;
    if (x < w * 0.25) dir = 1;
    else if (x > w * 0.75) dir = -1;
    else dir = Math.random() < 0.5 ? -1 : 1;
    state.birds.push(new Bird(speciesKey, x, y, dir));
}

// ─── SKY DRAW ───────────────────────────────────────────────────────────────
// Build gradient from palette stops
function applyGrad(grad, stops) {
    for (const [pos, col] of stops) grad.addColorStop(pos, col);
}

// Smooth crossfade between two palettes by mixing two full draws into the sky canvas.
function drawSky(time) {
    const w = skyCanvas.clientWidth;
    const h = skyCanvas.clientHeight;

    const pCurr = state.paletteCurr;
    const pPrev = state.palettePrev || pCurr;
    const blend = state.paletteT;

    // 1. Base sky — draw both gradients, blend with alpha
    skyCtx.globalAlpha = 1;
    let g = skyCtx.createLinearGradient(0, 0, 0, h);
    applyGrad(g, pPrev.sky);
    skyCtx.fillStyle = g;
    skyCtx.fillRect(0, 0, w, h);

    if (blend < 1) {
        skyCtx.globalAlpha = blend;
    } else {
        skyCtx.globalAlpha = 1;
    }
    g = skyCtx.createLinearGradient(0, 0, 0, h);
    applyGrad(g, pCurr.sky);
    skyCtx.fillStyle = g;
    skyCtx.fillRect(0, 0, w, h);
    skyCtx.globalAlpha = 1;

    // 2. Stars (only if either palette uses them, fade by their respective alphas)
    if (pPrev.stars || pCurr.stars) {
        const ap = pPrev.stars ? (1 - blend) : 0;
        const ac = pCurr.stars ? blend : 0;
        const total = ap + ac;
        if (total > 0) drawStars(time, total);
    }

    // 3. Moon (night only)
    if (pPrev.moon || pCurr.moon) {
        const ap = pPrev.moon ? (1 - blend) : 0;
        const ac = pCurr.moon ? blend : 0;
        const total = ap + ac;
        if (total > 0) drawMoon(time, total, w, h);
    }

    // 4. Clouds — blended between palettes
    drawClouds(time, w, h, pPrev, pCurr, blend);
}

// Stars: deterministic positions (twinkle by time)
const _stars = (() => {
    const out = [];
    // Seed PRNG to keep stars consistent across renders
    let s = 1337;
    const rnd = () => (s = (s * 9301 + 49297) % 233280) / 233280;
    for (let i = 0; i < 220; i++) {
        out.push({
            x: rnd(),
            y: rnd() * 0.85,           // avoid horizon
            r: 0.4 + rnd() * 1.4,
            phase: rnd() * Math.PI * 2,
            speed: 0.0007 + rnd() * 0.0015,
        });
    }
    return out;
})();

function drawStars(time, alpha) {
    const w = skyCanvas.clientWidth;
    const h = skyCanvas.clientHeight;
    skyCtx.save();
    for (const s of _stars) {
        const tw = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * s.speed + s.phase));
        skyCtx.globalAlpha = alpha * tw;
        skyCtx.fillStyle = '#fff';
        skyCtx.beginPath();
        skyCtx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
        skyCtx.fill();
    }
    skyCtx.restore();
}

function drawMoon(time, alpha, w, h) {
    const mx = w * 0.78;
    const my = h * 0.22;
    const R = Math.min(w, h) * 0.06;
    skyCtx.save();
    skyCtx.globalAlpha = alpha;
    // Halo
    const g = skyCtx.createRadialGradient(mx, my, 0, mx, my, R * 3.5);
    g.addColorStop(0, 'rgba(220, 230, 255, 0.20)');
    g.addColorStop(1, 'rgba(220, 230, 255, 0)');
    skyCtx.fillStyle = g;
    skyCtx.beginPath();
    skyCtx.arc(mx, my, R * 3.5, 0, Math.PI * 2);
    skyCtx.fill();
    // Disk
    skyCtx.fillStyle = '#dde6f5';
    skyCtx.beginPath();
    skyCtx.arc(mx, my, R, 0, Math.PI * 2);
    skyCtx.fill();
    // Subtle crater shadow on the right edge
    skyCtx.fillStyle = 'rgba(100, 110, 140, 0.18)';
    skyCtx.beginPath();
    skyCtx.arc(mx + R * 0.3, my, R * 0.92, 0, Math.PI * 2);
    skyCtx.fill();
    skyCtx.restore();
}

// Cloud layers — pre-rendered to a downscaled buffer for performance.
function drawClouds(time, w, h, pPrev, pCurr, blend) {
    // Mix cloud color + opacity between palettes
    const tintR = lerp(pPrev.cloud[0], pCurr.cloud[0], blend);
    const tintG = lerp(pPrev.cloud[1], pCurr.cloud[1], blend);
    const tintB = lerp(pPrev.cloud[2], pCurr.cloud[2], blend);
    const op = lerp(pPrev.cloudOpacity, pCurr.cloudOpacity, blend);
    if (op < 0.005) return;

    // Build / reuse downscaled buffer
    const DS = 5;
    const dsW = Math.ceil(w / DS);
    const dsH = Math.ceil(h / DS);
    if (!drawClouds._buf || drawClouds._buf.width !== dsW || drawClouds._buf.height !== dsH) {
        drawClouds._buf = document.createElement('canvas');
        drawClouds._buf.width = dsW;
        drawClouds._buf.height = dsH;
        drawClouds._bufCtx = drawClouds._buf.getContext('2d');
        drawClouds._imgData = drawClouds._bufCtx.createImageData(dsW, dsH);
    }
    const buf = drawClouds._buf;
    const bufCtx = drawClouds._bufCtx;
    const imgData = drawClouds._imgData;
    const data = imgData.data;

    // Two layers — slow + fast — summed sin "noise"
    const layers = [
        { scale: 0.008, speed: 0.000020, weight: 0.65 },
        { scale: 0.018, speed: 0.000045, weight: 0.35 },
    ];
    for (let y = 0; y < dsH; y++) {
        for (let x = 0; x < dsW; x++) {
            let v = 0;
            for (const L of layers) {
                const tt = time * L.speed;
                v += (
                    Math.sin((x * DS + tt * 100000) * L.scale)
                  * Math.cos((y * DS + tt * 80000) * L.scale * 1.3) * 0.5
                  + Math.sin((x * DS + tt * 130000) * L.scale * 2 + 1.7)
                  * Math.cos((y * DS + tt * 60000) * L.scale * 2.7 + 0.5) * 0.25
                  + 0.25
                ) * L.weight;
            }
            // Top-biased (more clouds up there)
            const yBias = 1.0 - (y / dsH) * 0.6;
            const cv = Math.max(0, v * yBias);
            const cloudAmt = Math.min(1, cv * cv * 1.6);

            const idx = (y * dsW + x) * 4;
            data[idx]   = tintR;
            data[idx+1] = tintG;
            data[idx+2] = tintB;
            data[idx+3] = cloudAmt * 255;
        }
    }
    bufCtx.putImageData(imgData, 0, 0);

    skyCtx.save();
    skyCtx.globalAlpha = op;
    skyCtx.imageSmoothingEnabled = true;
    skyCtx.imageSmoothingQuality = 'high';
    skyCtx.drawImage(buf, 0, 0, w, h);
    skyCtx.restore();
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ─── MODE SWITCH ────────────────────────────────────────────────────────────
function setMode(mode) {
    if (mode === state.mode && state.paletteCurr) return;
    state.palettePrev = state.paletteCurr || PALETTES[mode];
    state.paletteCurr = PALETTES[mode];
    state.paletteT = state.paletteCurr === state.palettePrev ? 1 : 0;
    state.mode = mode;
    document.querySelectorAll('[data-mode]').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
    });
    $('hud-mode').textContent = mode.toUpperCase();
}

// ─── TOUCH (tap the sky) ────────────────────────────────────────────────────
function pointFromEvent(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    // Skip clicks on the panel/back/hud
    const panelEl = document.getElementById('panel');
    if (panelEl) {
        const pr = panelEl.getBoundingClientRect();
        if (clientX >= pr.left && clientX <= pr.right &&
            clientY >= pr.top  && clientY <= pr.bottom) return null;
    }
    const back = document.querySelector('.back');
    if (back) {
        const br = back.getBoundingClientRect();
        if (clientX >= br.left && clientX <= br.right &&
            clientY >= br.top && clientY <= br.bottom) return null;
    }
    return [clientX, clientY];
}

function handleTap(e) {
    const pt = pointFromEvent(e);
    if (!pt) return;
    e.preventDefault();
    hideHint();
    startAudioIfNeeded().then(() => spawnBird(pt[0], pt[1]));
}

birdsCanvas.addEventListener('pointerdown', handleTap, { passive: false });

// ─── AUDIO ARM ──────────────────────────────────────────────────────────────
async function startAudioIfNeeded() {
    if (state.started) return;
    await initAudio();
    state.started = true;
}
['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev => {
    window.addEventListener(ev, startAudioIfNeeded, { once: true, passive: true });
});

// ─── HINT ───────────────────────────────────────────────────────────────────
const hintEl = document.getElementById('hint');
function hideHint() { hintEl.classList.add('gone'); }

// ─── PANEL ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

document.querySelectorAll('[data-mode]').forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
});

const chorusToggle = $('chorus-toggle');
chorusToggle.addEventListener('click', () => {
    state.chorus = !state.chorus;
    chorusToggle.classList.toggle('on', state.chorus);
    if (state.chorus) {
        state.nextChorusAt = state.t + 400;
        startAudioIfNeeded();
        hideHint();
    }
});

$('pitch').addEventListener('input', e => {
    state.pitch = parseInt(e.target.value, 10) / 100;
    $('pitch-val').textContent = '×' + state.pitch.toFixed(2);
    $('hud-pitch').textContent = '×' + state.pitch.toFixed(2);
});

$('density').addEventListener('input', e => {
    state.density = parseInt(e.target.value, 10) / 100;
    $('density-val').textContent = state.density.toFixed(2);
});

const panel = $('panel');
$('panel-head').addEventListener('click', () => panel.classList.toggle('minimized'));

// Init mode (sets paletteCurr)
setMode('day');

// ─── MAIN LOOP ──────────────────────────────────────────────────────────────
let lastTime = performance.now();
function loop(now) {
    const dt = now - lastTime;
    lastTime = now;
    state.t += dt;

    // Palette crossfade — 1.6s
    if (state.paletteT < 1) {
        state.paletteT = Math.min(1, state.paletteT + dt / 1600);
    }

    drawSky(state.t);

    // Birds — clear birds canvas, update, draw
    const bw = birdsCanvas.clientWidth, bh = birdsCanvas.clientHeight;
    birdCtx.clearRect(0, 0, bw, bh);
    for (let i = state.birds.length - 1; i >= 0; i--) {
        const b = state.birds[i];
        b.update(dt);
        if (b.isDead(bw, bh)) {
            state.birds.splice(i, 1);
            continue;
        }
        b.draw(birdCtx);
    }

    // Ambient chorus auto-spawn
    if (state.chorus && state.t > state.nextChorusAt) {
        // Spawn at a random sky position (upper 70% of screen)
        const x = bw * (0.1 + Math.random() * 0.8);
        const y = bh * (0.1 + Math.random() * 0.55);
        spawnBird(x, y);
        // Rate: density 0 = ~5s between birds, density 1 = ~0.6s
        const interval = lerp(5000, 600, state.density);
        state.nextChorusAt = state.t + interval * (0.6 + Math.random() * 0.8);
    }

    // HUD
    $('hud-flock').textContent = state.birds.length;

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Prevent iOS double-tap zoom
let _lastTouchEnd = 0;
document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - _lastTouchEnd < 350) e.preventDefault();
    _lastTouchEnd = now;
}, { passive: false });
</script>

</body>
