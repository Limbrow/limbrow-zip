<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heliogabalo · preview</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: #e6c2b6;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
    }
    .stage {
        position: fixed;
        inset: 0;
        background-image: url('painting.jpg');
        background-repeat: no-repeat;
        /* The painting is landscape (~214 × 133); the river of pink petals
           and the smothered guests live in the lower half. Anchor low so the
           grid card always shows that downpour of rose petals. */
        background-position: 50% 72%;
        background-size: cover;
        animation: breathe 18s ease-in-out infinite alternate;
        transform-origin: 50% 70%;
    }
    @keyframes breathe {
        from { transform: scale(1.00); filter: brightness(1.00) saturate(1.00); }
        to   { transform: scale(1.07); filter: brightness(1.05) saturate(1.06); }
    }
    /* Soft warm vignette so the card sits on the grid like a printed plate. */
    .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
            radial-gradient(ellipse at 50% 55%, transparent 50%, rgba(50, 18, 20, 0.22) 100%);
    }
</style>
</head>
<body>
<div class="stage"></div>
<div class="vignette"></div>
</body>
</html>
