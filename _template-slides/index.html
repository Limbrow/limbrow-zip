<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>untitled · limbrow.zip</title>
<style>
    /* ── SLIDES TEMPLATE ──────────────────────────────────────────────
       Vertical Tinder-style swipe. Native CSS scroll-snap = zero JS for nav.
       Each <section class="slide"> becomes one full-screen slide.
       What lives inside each slide is YOUR call:
         - an <img> for a flat image
         - a <canvas> for a sketch
         - a <video> autoplay loop
         - free HTML for text/credits
         - an <iframe> if a slide needs a fully isolated sketch
       The container imposes no aesthetic. The slide's content is the post.
    ───────────────────────────────────────────────────────────────────── */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        background: #000;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        color: #fff;
    }

    /* The scrollable column */
    .deck {
        height: 100%;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
    }
    .deck::-webkit-scrollbar { display: none; }
    .deck { scrollbar-width: none; }

    /* Each slide fills the viewport and snaps */
    .slide {
        height: 100vh;
        height: 100dvh;
        width: 100%;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        overflow: hidden;
    }

    /* Default image style — full-cover, contained */
    .slide img,
    .slide video {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
    }

    /* When you want an image to bleed-edge */
    .slide.bleed img,
    .slide.bleed video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* A canvas slide takes the full slide */
    .slide canvas {
        display: block;
        width: 100%;
        height: 100%;
    }

    /* Iframe slides — for fully isolated sketches */
    .slide iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
    }

    /* Text slides — minimal centered text */
    .slide.text {
        padding: 8vw;
        text-align: center;
    }

    .slide.text p {
        font-size: clamp(14px, 2.6vw, 18px);
        line-height: 1.6;
        max-width: 38ch;
        color: rgba(255,255,255,0.85);
    }

    /* Back to grid — top-left arrow */
    .back {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 100;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 50%;
        color: #fff;
        text-decoration: none;
        font-size: 16px;
        line-height: 1;
        padding-bottom: 2px;
        transition: background 0.15s;
    }
    .back:hover { background: rgba(0,0,0,0.7); }
    .back:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 2px;
    }
</style>
</head>
<body>

<a class="back" href="/" aria-label="Back to grid">←</a>

<div class="deck">

    <!-- ════════ SLIDE 1 — IMAGE ════════ -->
    <section class="slide bleed">
        <!-- Replace src with your image -->
        <img src="assets/01.webp" alt="">
    </section>

    <!-- ════════ SLIDE 2 — IMAGE ════════ -->
    <section class="slide">
        <img src="assets/02.webp" alt="">
    </section>

    <!-- ════════ SLIDE 3 — INTERACTIVE SKETCH ════════ -->
    <!-- Inline canvas sketch — the code lives right here, replacing whatever the slide should "be" -->
    <section class="slide">
        <canvas id="sketch-3"></canvas>
        <script>
        (() => {
            // Example: a slow rotating fractal-ish thing.
            // Replace this entire block with whatever sketch fits this slide.
            const c = document.getElementById('sketch-3');
            const ctx = c.getContext('2d');
            function fit() {
                const r = c.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                c.width = r.width * dpr;
                c.height = r.height * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            window.addEventListener('resize', fit);
            fit();

            let t = 0;
            function draw() {
                const w = c.clientWidth, h = c.clientHeight;
                ctx.fillStyle = 'rgba(0,0,0,0.04)';
                ctx.fillRect(0, 0, w, h);
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 1;
                const cx = w/2, cy = h/2;
                const arms = 6;
                for (let i = 0; i < arms; i++) {
                    const a = t*0.005 + (i/arms)*Math.PI*2;
                    const r = 80 + Math.sin(t*0.01 + i) * 60;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
                    ctx.stroke();
                }
                t++;
                requestAnimationFrame(draw);
            }
            draw();
        })();
        </script>
    </section>

    <!-- ════════ SLIDE 4 — IMAGE ════════ -->
    <section class="slide">
        <img src="assets/03.webp" alt="">
    </section>

    <!-- ════════ SLIDE 5 — TEXT ════════ -->
    <section class="slide text">
        <p>
            limbrow.zip — explorations, traces, fragments.
            <br><br>
            Each post is a different shape.
        </p>
    </section>

</div>

</body>
</html>
